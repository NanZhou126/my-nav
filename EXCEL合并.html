<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨Excel 合并工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #faf3e0;
            min-height: 100vh; 
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { 
            color: #ff6b9d;
            text-align: center; 
            margin-bottom: 30px; 
            font-size: 2.2rem;
            font-weight: 700;
            text-shadow: 3px 3px 0 #fee440;
            letter-spacing: -0.5px;
        }
        
        .card {
            background: #ffffffdd;
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 15px 30px -10px rgba(255, 107, 157, 0.2), 0 0 0 2px #fee440 inset, 0 0 0 4px #a2e3c4 inset;
            border: 3px solid #9b5de5;
        }
        
        .upload-zone {
            border: 4px dashed #ff6b9d;
            border-radius: 28px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fff0f5;
            box-shadow: 0 10px 0 #9b5de5;
        }
        .upload-zone:hover { 
            border-color: #9b5de5; 
            background: #ffe9f0; 
            transform: translateY(-4px);
            box-shadow: 0 14px 0 #9b5de5;
        }
        .upload-zone.dragover { 
            border-color: #00bbf9; 
            background: #e0f2fe; 
            transform: scale(1.02);
            box-shadow: 0 10px 0 #00bbf9;
        }
        .upload-icon { font-size: 4rem; margin-bottom: 15px; filter: drop-shadow(4px 4px 0 #fee440); }
        .upload-text { color: #3b2e6b; font-size: 1.3rem; font-weight: 600; }
        .upload-hint { color: #ff6b9d; font-size: 1rem; margin-top: 10px; font-weight: 500; }
        #fileInput { display: none; }
        .file-list { margin-top: 20px; }
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 22px;
            background: #a2e3c4;
            border-radius: 60px;
            margin-bottom: 12px;
            border: 3px solid #9b5de5;
            box-shadow: 0 6px 0 #9b5de5;
        }
        .file-info { display: flex; align-items: center; gap: 16px; }
        .file-icon { font-size: 2rem; filter: drop-shadow(2px 2px 0 #fee440); }
        .file-name { font-weight: 700; color: #3b2e6b; font-size: 1.1rem; }
        .file-meta { font-size: 0.9rem; color: #5f4b8b; font-weight: 600; }
        .file-remove {
            background: #ff6b9d;
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.95rem;
            border: 2px solid #9b5de5;
            box-shadow: 0 4px 0 #9b5de5;
            transition: all 0.1s ease;
        }
        .file-remove:hover { 
            background: #ff4d88; 
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #9b5de5;
        }
        .file-remove:active { transform: translateY(4px); box-shadow: 0 0 0 #9b5de5; }
        
        .section-title { 
            font-size: 1.6rem; 
            color: #9b5de5; 
            margin-bottom: 20px; 
            display: flex; 
            align-items: center; 
            gap: 15px;
            font-weight: 700;
            text-shadow: 2px 2px 0 #fee440;
        }
        
        .btn-group { display: flex; gap: 15px; margin-top: 20px; flex-wrap: wrap; }
        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s ease;
            border: 3px solid #3b2e6b;
            box-shadow: 0 6px 0 #3b2e6b;
        }
        .btn-primary { 
            background: #00bbf9;
            color: #3b2e6b; 
        }
        .btn-primary:hover { 
            transform: translateY(-3px);
            box-shadow: 0 9px 0 #3b2e6b;
            background: #23c5ff;
        }
        .btn-primary:active { transform: translateY(3px); box-shadow: 0 3px 0 #3b2e6b; }
        
        .btn-secondary { 
            background: #fee440;
            color: #3b2e6b; 
        }
        .btn-secondary:hover { 
            transform: translateY(-3px);
            box-shadow: 0 9px 0 #3b2e6b;
            background: #ffe95c;
        }
        
        .btn-success { 
            background: #a2e3c4;
            color: #3b2e6b; 
        }
        .btn-success:hover { 
            transform: translateY(-3px);
            box-shadow: 0 9px 0 #3b2e6b;
            background: #b8efd2;
        }
        
        .btn-danger { 
            background: #ff6b9d;
            color: white; 
        }
        .btn-danger:hover { 
            transform: translateY(-3px);
            box-shadow: 0 9px 0 #3b2e6b;
            background: #ff85b2;
        }
        
        .btn-warning { 
            background: #f18f01;
            color: white; 
        }
        .btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #3b2e6b; }
        
        .hidden { display: none; }
        .alert { 
            padding: 18px 25px; 
            border-radius: 50px; 
            margin-bottom: 20px; 
            font-weight: 600;
            border: 3px solid #3b2e6b;
            box-shadow: 0 5px 0 #3b2e6b;
        }
        .alert-info { 
            background: #a2e3c4; 
            color: #3b2e6b; 
        }
        .alert-warning { 
            background: #fee440; 
            color: #3b2e6b; 
        }
        .alert-danger { 
            background: #ff6b9d; 
            color: white; 
        }

        .header-row-panel {
            background: #fee440;
            border-radius: 60px;
            padding: 20px 25px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            border: 3px solid #9b5de5;
            box-shadow: 0 8px 0 #9b5de5;
        }
        .header-row-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: white;
            padding: 8px 18px;
            border-radius: 40px;
            box-shadow: 0 4px 0 #9b5de5;
            border: 2px solid #9b5de5;
        }
        .header-row-item span { 
            font-weight: 700; 
            color: #ff6b9d; 
            white-space: nowrap; 
            max-width: 180px; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }
        .header-row-item input {
            width: 70px;
            padding: 8px 12px;
            border: 2px solid #00bbf9;
            border-radius: 30px;
            font-size: 1rem;
            text-align: center;
            outline: none;
            font-weight: 600;
        }
        .header-row-item input:focus { border-color: #9b5de5; }
        .header-row-item input.invalid { border-color: #ff6b9d; background: #ffe9f0; }
        .apply-header-row-btn {
            background: #00bbf9;
            color: #3b2e6b;
            border: none;
            padding: 12px 32px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            border: 3px solid #3b2e6b;
            box-shadow: 0 5px 0 #3b2e6b;
        }
        .apply-header-row-btn:hover { transform: translateY(-2px); box-shadow: 0 7px 0 #3b2e6b; }

        .mapping-table-wrapper {
            overflow-x: auto;
            margin-top: 20px;
            max-height: 600px;
            overflow-y: auto;
            border: 3px solid #9b5de5;
            border-radius: 24px;
            background: #fff0f5;
            box-shadow: 0 10px 0 #9b5de5;
        }
        .mapping-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }
        .mapping-table th, .mapping-table td {
            padding: 15px 18px;
            border: 2px solid #9b5de5;
            text-align: left;
            vertical-align: top;
        }
        .mapping-table th {
            background: #00bbf9;
            color: #3b2e6b;
            font-weight: 700;
            font-size: 1rem;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 4px solid #9b5de5;
        }
        .mapping-table th.file-header {
            background: #a2e3c4;
        }
        .mapping-table tr:nth-child(even) {
            background: #fce2db;
        }
        .mapping-table tr:hover {
            background: #ffe9f0;
        }
        
        .column-cell {
            min-width: 220px;
            position: relative;
            padding: 12px !important;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .column-cell:hover {
            box-shadow: 0 0 0 3px #ff6b9d;
        }
        
        .cell-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .cell-name-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fee440;
            padding: 6px 12px;
            border-radius: 30px;
            border: 2px solid #9b5de5;
        }
        .cell-name-row span {
            font-weight: 700;
            color: #3b2e6b;
            font-size: 1rem;
        }
        
        .cell-original-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            color: #ff6b9d;
            background: white;
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid #ff6b9d;
        }
        .cell-original-row .label {
            font-weight: 600;
            color: #3b2e6b;
        }
        
        .cell-sample-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #00bbf9;
            background: #f0f9ff;
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid #00bbf9;
        }
        .cell-sample-row .label {
            font-weight: 600;
            color: #3b2e6b;
        }
        
        .cell-input-wrapper {
            margin-top: 4px;
        }
        .column-input {
            width: 100%;
            padding: 10px 14px;
            border: 3px solid #00bbf9;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 500;
            background: white;
        }
        .column-input:focus {
            outline: none;
            border-color: #9b5de5;
            box-shadow: 0 0 0 4px #fee440;
        }
        .column-input.modified {
            border-color: #a2e3c4;
            background: #f0fff4;
        }
        .column-input.matched {
            border-color: #ff6b9d;
            background: #fff0f5;
        }
        
        .checkbox-cell {
            text-align: center;
            width: 60px;
        }
        .checkbox-cell input {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: #ff6b9d;
        }
        .no-data {
            color: #ff6b9d;
            font-style: italic;
            font-weight: 500;
            background: #fff0f5;
            text-align: center;
            padding: 20px !important;
        }
        
        .cell-delete-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid #3b2e6b;
            background: #ff6b9d;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 2px 0 #3b2e6b;
        }
        .cell-delete-btn:hover {
            background: #ff4d88;
            transform: translateY(-2px);
            box-shadow: 0 4px 0 #3b2e6b;
        }
        .cell-delete-btn:active {
            transform: translateY(2px);
            box-shadow: 0 0 0 #3b2e6b;
        }
        
        .cell-restore-hint {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #00bbf9;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            border: 1px solid #3b2e6b;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 10;
        }
        .deleted-cell:hover .cell-restore-hint {
            opacity: 1;
        }
        
        .deleted-cell {
            opacity: 0.4;
            background: #ffd1d1 !important;
            position: relative;
        }
        .deleted-cell::after {
            content: "🗑️ 已删除 点击恢复";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #ff6b9d;
            color: white;
            font-size: 0.8rem;
            font-weight: bold;
            padding: 6px 12px;
            border-radius: 30px;
            border: 2px solid #3b2e6b;
            white-space: nowrap;
            z-index: 5;
            cursor: pointer;
            pointer-events: none;
        }
        .deleted-cell .cell-delete-btn {
            opacity: 0.5;
            pointer-events: none;
        }
        
        .column-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 3px solid #9b5de5;
            border-radius: 20px;
            box-shadow: 0 8px 0 #9b5de5;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
        }
        .suggestion-item {
            padding: 12px 18px;
            cursor: pointer;
            border-bottom: 2px solid #fee440;
            font-weight: 500;
        }
        .suggestion-item:hover {
            background: #a2e3c4;
        }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-count {
            font-size: 0.8rem;
            color: #ff6b9d;
            float: right;
            font-weight: 600;
        }
        
        .legend {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding: 18px 25px;
            background: #a2e3c4;
            border-radius: 60px;
            border: 3px solid #9b5de5;
            box-shadow: 0 6px 0 #9b5de5;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            font-weight: 600;
            color: #3b2e6b;
        }
        .legend-color {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 3px solid #3b2e6b;
        }
        .legend-color.original { background: white; }
        .legend-color.modified { background: #a2e3c4; }
        .legend-color.matched { background: #fee440; }
        .legend-color.deleted { background: #ffd1d1; border-color: #ff6b9d; }
        
        .quick-actions {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .quick-btn {
            padding: 10px 22px;
            border: 3px solid #3b2e6b;
            background: white;
            color: #3b2e6b;
            border-radius: 40px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
            box-shadow: 0 4px 0 #3b2e6b;
            transition: all 0.15s;
        }
        .quick-btn:hover {
            background: #fee440;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #3b2e6b;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 18px;
            margin-bottom: 25px;
        }
        .stat-item {
            background: #ff6b9d;
            color: white;
            padding: 20px;
            border-radius: 40px;
            text-align: center;
            border: 3px solid #3b2e6b;
            box-shadow: 0 8px 0 #3b2e6b;
        }
        .stat-value {
            font-size: 2.2rem;
            font-weight: 800;
        }
        .stat-label {
            font-size: 1rem;
            opacity: 1;
            font-weight: 600;
        }

        .regex-panel {
            background: #fee440;
            border: 3px solid #9b5de5;
            border-radius: 60px;
            padding: 18px 25px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            box-shadow: 0 8px 0 #9b5de5;
        }
        .regex-panel label { 
            font-weight: 700; 
            color: #3b2e6b; 
            font-size: 1.1rem;
        }
        .column-singleselect {
            padding: 12px 18px;
            border: 3px solid #00bbf9;
            border-radius: 40px;
            background: white;
            min-width: 220px;
            font-size: 1rem;
            font-weight: 600;
            outline: none;
        }
        .regex-input {
            flex: 1;
            min-width: 240px;
            padding: 12px 20px;
            border: 3px solid #ff6b9d;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
        }
        .regex-input:focus {
            border-color: #9b5de5;
            box-shadow: 0 0 0 4px #fee440;
        }

        .table-wrapper {
            max-height: 560px;
            overflow: auto;
            border-radius: 28px;
            border: 3px solid #9b5de5;
            position: relative;
            background: white;
            box-shadow: 0 12px 0 #9b5de5;
        }
        
        .preview-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 0.95rem;
        }
        
        .preview-table th, 
        .preview-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 2px solid #9b5de5;
            border-right: 2px solid #9b5de5;
            white-space: nowrap;
            background: white;
        }
        
        .preview-table thead tr:first-child th {
            position: sticky !important;
            top: 0 !important;
            z-index: 1000 !important;
            background: #00bbf9 !important;
            color: #3b2e6b !important;
            font-weight: 700;
            border-bottom: 4px solid #9b5de5 !important;
            box-shadow: 0 4px 0 #9b5de5 !important;
        }
        
        .preview-table thead tr.filter-row th {
            position: sticky !important;
            z-index: 900 !important;
            background: #a2e3c4 !important;
            color: #3b2e6b;
            padding: 8px 6px;
            border-bottom: 3px solid #9b5de5 !important;
        }
        
        .preview-table th.frozen-col, 
        .preview-table td.frozen-col {
            position: sticky !important;
            left: 0 !important;
            z-index: 800 !important;
            background: #fee440 !important;
            color: #3b2e6b !important;
            font-weight: 700;
            text-align: center;
            min-width: 60px;
            max-width: 60px;
            border-right: 3px solid #9b5de5 !important;
        }
        
        .preview-table thead tr:first-child th.frozen-col { 
            z-index: 1100 !important; 
            background: #ff6b9d !important; 
            color: white !important; 
        }
        
        .preview-table thead tr.filter-row th.frozen-col { 
            z-index: 1000 !important; 
            background: #f18f01 !important; 
        }
        
        .preview-table th:last-child,
        .preview-table td:last-child {
            position: sticky !important;
            z-index: 800 !important;
            background: #a2e3c4;
            border-left: 3px solid #9b5de5 !important;
        }
        
        .preview-table thead tr:first-child th:last-child {
            z-index: 1100 !important;
            background: #ff6b9d !important;
            color: white !important;
        }
        
        .preview-table thead tr.filter-row th:last-child {
            z-index: 1000 !important;
            background: #f18f01 !important;
        }
        
        .preview-table tbody tr:nth-child(even) td { 
            background: #fce2db; 
        }
        .preview-table tbody tr:nth-child(even) td.frozen-col { 
            background: #f8d5c9; 
        }
        .preview-table tbody tr:nth-child(even) td:last-child { 
            background: #fce2db; 
        }
        
        .preview-table tbody tr:hover td { 
            background: #ffe9f0; 
        }

        .header-cell { position: relative; min-width: 120px; }
        .header-top-row { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            background: #fee440;
            padding: 4px 10px;
            border-radius: 40px;
            border: 2px solid #9b5de5;
        }
        .header-name {
            cursor: pointer;
            padding: 4px 8px;
            font-weight: 700;
        }
        .header-name:hover { background: #ff6b9d; color: white; border-radius: 30px; }
        .header-delete-btn {
            width: 28px; height: 28px; border-radius: 50%;
            border: 2px solid #3b2e6b;
            background: #ff6b9d;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: bold;
        }
        .header-delete-btn:hover { background: #ff4d88; }

        .pagination-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
            padding: 15px 20px;
            background: #a2e3c4;
            border-radius: 60px;
            border: 3px solid #9b5de5;
            box-shadow: 0 6px 0 #9b5de5;
        }
        .page-btn {
            min-width: 42px;
            height: 42px;
            border: 3px solid #3b2e6b;
            border-radius: 50%;
            background: white;
            color: #3b2e6b;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin: 0 3px;
            box-shadow: 0 4px 0 #3b2e6b;
        }
        .page-btn:hover:not(:disabled) {
            background: #fee440;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #3b2e6b;
        }
        .page-btn.active {
            background: #ff6b9d;
            color: white;
            border-color: #3b2e6b;
        }
        .page-size-select {
            padding: 8px 15px;
            border: 3px solid #00bbf9;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 600;
            background: white;
        }

        .conflict-preview {
            max-height: 300px;  /* 增加高度 */
            overflow-y: auto;
            margin: 15px 0;
            border: 3px solid #ff6b9d;
            border-radius: 20px;
            background: white;
        }
        .conflict-preview th {
            background: #ff6b9d;
            color: white;

            <div class="header-row-panel" id="headerRowPanel"></div>
                       
            <div class="quick-actions">
                <button class="quick-btn" onclick="resetAllNames()">↩️ 重置所有列名</button>

<script>
// ==================== 全局状态 ====================
let uploadedFiles = [];
let parsedData = [];
let columnMappings = {};  // 存储列映射：{文件索引: {原始列名: 新列名}}
let mergedData = [];
let previewCols = [];
let colSourceMap = {};

// 记录每个单元格是否被删除，使用复合键 "文件索引_列索引_字段索引"
let deletedCells = {};

// 新增：存储每个单元格的独立映射
let cellMappings = {};  // 格式: {文件索引_行索引_列索引: 自定义名称}

let headerRowNumbers = {};

let activeFilters = {};
let openSourcePopover = null;
let openFilterDropdown = null;
let editingHeader = null;
let regexFilter = null;

let currentPage = 1;
let pageSize = 100;
const PAGE_SIZES = [50, 100, 200, 500, 1000];

// DOM
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
const fileList = document.getElementById('fileList');
const mappingSection = document.getElementById('mappingSection');
const mappingHead = document.getElementById('mappingHead');
const mappingBody = document.getElementById('mappingBody');
const headerRowPanel = document.getElementById('headerRowPanel');
const previewSection = document.getElementById('previewSection');
const mergeBtn = document.getElementById('mergeBtn');
const clearBtn = document.getElementById('clearBtn');
const downloadBtn = document.getElementById('downloadBtn');
const downloadCsvBtn = document.getElementById('downloadCsvBtn');

const regexColumnSelect = document.getElementById('regexColumnSelect');
const regexPattern = document.getElementById('regexPattern');
const regexMatchBtn = document.getElementById('regexMatchBtn');
const regexNotMatchBtn = document.getElementById('regexNotMatchBtn');
const regexClearBtn = document.getElementById('regexClearBtn');

// ==================== 初始化事件 ====================
uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', e => { e.preventDefault(); uploadZone.classList.remove('dragover'); });
uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('dragover'); processFiles(Array.from(e.dataTransfer.files)); });
fileInput.addEventListener('change', e => processFiles(Array.from(e.target.files)));
mergeBtn.addEventListener('click', mergeFiles);
clearBtn.addEventListener('click', clearAll);
downloadBtn.addEventListener('click', () => downloadFile('xlsx'));
downloadCsvBtn.addEventListener('click', () => downloadFile('csv'));

regexMatchBtn.addEventListener('click', () => applyRegexFilter(true));
regexNotMatchBtn.addEventListener('click', () => applyRegexFilter(false));
regexClearBtn.addEventListener('click', clearRegexFilter);

document.addEventListener('click', e => {
    if (openSourcePopover !== null && !e.target.closest('.source-badge') && !e.target.closest('.source-popover')) {
        openSourcePopover = null; renderPreviewHeader();
    }
    if (openFilterDropdown !== null && !e.target.closest('.filter-mode-btn') && !e.target.closest('.filter-dropdown')) {
        openFilterDropdown = null; renderFilterRow();
    }
});

document.getElementById('previewWrapper')?.addEventListener('scroll', function() {
    adjustFilterRowTop();
});

// ==================== 文件处理 ====================
async function processFiles(files) {
    const validFiles = files.filter(f => /\.(xlsx|xls|csv)$/i.test(f.name));
    if (!validFiles.length) { alert('请上传有效的 Excel 或 CSV 文件'); return; }
    for (const file of validFiles) {
        if (!uploadedFiles.find(f => f.name === file.name)) {
            uploadedFiles.push(file);
            await parseFile(file);
        }
    }
    uploadedFiles.forEach((_, idx) => { if (headerRowNumbers[idx] === undefined) headerRowNumbers[idx] = 1; });
    renderFileList();
    renderHeaderRowPanel();
    buildColumnMappings();
    renderMappingTable();
    mappingSection.classList.remove('hidden');
}

async function parseFile(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => {
            try {
                const data = new Uint8Array(e.target.result);
                const wb = XLSX.read(data, { type: 'array' });
                const sheet = wb.Sheets[wb.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
                parsedData.push({ fileName: file.name, rawRows: rows });
                resolve();
            } catch (err) { reject(err); }
        };
        reader.onerror = reject;
        reader.readAsArrayBuffer(file);
    });
}

function renderFileList() {
    fileList.innerHTML = uploadedFiles.map((file, i) => {
        const p = parsedData[i];
        const rowCount = p ? p.rawRows.length : 0;
        return `<div class="file-item"><div class="file-info"><span class="file-icon">📄</span><div><div class="file-name">${file.name}</div><div class="file-meta">${rowCount} 行</div></div></div><button class="file-remove" onclick="removeFile(${i})">删除</button></div>`;
    }).join('');
}

function removeFile(index) {
    uploadedFiles.splice(index, 1);
    parsedData.splice(index, 1);
    const newHeader = {};
    Object.keys(headerRowNumbers).forEach(k => {
        const ki = parseInt(k);
        if (ki < index) newHeader[ki] = headerRowNumbers[ki];
        else if (ki > index) newHeader[ki-1] = headerRowNumbers[ki];
    });
    headerRowNumbers = newHeader;
    
    // 更新deletedCells
    const newDeleted = {};
    Object.keys(deletedCells).forEach(key => {
        const [fi, rowIdx, colIdx] = key.split('_').map(Number);
        if (fi < index) newDeleted[`${fi}_${rowIdx}_${colIdx}`] = deletedCells[key];
        else if (fi > index) newDeleted[`${fi-1}_${rowIdx}_${colIdx}`] = deletedCells[key];
    });
    deletedCells = newDeleted;
    
    // 更新cellMappings
    const newCellMappings = {};
    Object.keys(cellMappings).forEach(key => {
        const [fi, rowIdx, colIdx] = key.split('_').map(Number);
        if (fi < index) newCellMappings[`${fi}_${rowIdx}_${colIdx}`] = cellMappings[key];
        else if (fi > index) newCellMappings[`${fi-1}_${rowIdx}_${colIdx}`] = cellMappings[key];
    });
    cellMappings = newCellMappings;
    
    buildColumnMappings();
    renderFileList();
    if (!uploadedFiles.length) {
        mappingSection.classList.add('hidden');
        previewSection.classList.add('hidden');
    } else {
        renderHeaderRowPanel();
        renderMappingTable();
    }
}

function columnHasData(rows, colIndex, startRow) {
    for (let r = startRow; r < rows.length; r++) {
        const row = rows[r] || [];
        const val = row[colIndex];
        if (val !== undefined && val !== null && String(val).trim() !== '') {
            return true;
        }
    }
    return false;
}

function getFileShortName(fileName) {
    let name = fileName.replace(/\.[^/.]+$/, "");
    if (name.length > 12) {
        name = name.substring(0, 10) + '…';
    }
    return name;
}

function buildColumnMappings() {
    columnMappings = {};
    parsedData.forEach((file, fi) => {
        const rowNum = headerRowNumbers[fi] || 1;
        const headers = extractHeaders(file.rawRows, rowNum);
        columnMappings[fi] = {};
        
        const filePrefix = getFileShortName(file.fileName);
        let emptyCounter = 1;
        
        headers.forEach((h, colIdx) => {
            const hasData = columnHasData(file.rawRows, colIdx, rowNum);
            
            if (hasData) {
                if (h && h.trim() !== '') {
                    columnMappings[fi][h] = h;
                } else {
                    const autoName = `${filePrefix}-列${emptyCounter.toString().padStart(3, '0')}`;
                    emptyCounter++;
                    columnMappings[fi][autoName] = autoName;
                    columnMappings[fi][`__empty_${colIdx}`] = autoName;
                }
            }
        });
        
        file.currentHeaders = headers;
    });
}

function extractHeaders(rows, n) {
    if (!rows || rows.length < n) return [];
    const headerRow = rows[n-1] || [];
    return headerRow.map(cell => (cell === undefined || cell === null) ? '' : String(cell).trim());
}

function getSampleCell(fileIdx, colIdx) {
    const file = parsedData[fileIdx];
    if (!file) return '';
    const headerRowNum = headerRowNumbers[fileIdx] || 1;
    const sampleRowIdx = headerRowNum;
    if (file.rawRows.length <= sampleRowIdx) return '';
    const row = file.rawRows[sampleRowIdx] || [];
    return row[colIdx] !== undefined ? String(row[colIdx]) : '';
}

// 获取单元格显示名称（优先使用独立映射）
function getDisplayColumnName(fileIdx, orig, colIdx, rowIdx) {
    // 1. 优先检查是否有单元格级独立映射
    const cellKey = `${fileIdx}_${rowIdx}_${colIdx}`;
    if (cellMappings[cellKey]) {
        return cellMappings[cellKey];
    }
    
    // 2. 其次检查空表头的自动命名
    const mapping = columnMappings[fileIdx] || {};
    if (mapping[`__empty_${colIdx}`]) {
        return mapping[`__empty_${colIdx}`];
    }
    
    // 3. 最后返回全局映射或原始名称
    return mapping[orig] || orig;
}

// ==================== 表头行面板 ====================
function renderHeaderRowPanel() {
    if (!uploadedFiles.length) return;
    let html = '';
    uploadedFiles.forEach((file, idx) => {
        const rowNum = headerRowNumbers[idx] || 1;
        const maxRows = parsedData[idx]?.rawRows.length || 0;
        const invalid = rowNum < 1 || rowNum > maxRows;
        html += `<div class="header-row-item"><span title="${file.name}">${file.name.length>20?file.name.slice(0,18)+'…':file.name}</span>
            <input type="number" min="1" max="${maxRows || 1}" value="${rowNum}" 
                data-file-idx="${idx}" class="header-row-input ${invalid?'invalid':''}" 
                onchange="onHeaderRowChange(${idx}, this.value)">
        </div>`;
    });
    html += `<button class="apply-header-row-btn" onclick="applyAllHeaderRows()">✨ 应用表头行并刷新</button>`;
    headerRowPanel.innerHTML = html;
}

function onHeaderRowChange(idx, val) {
    const num = parseInt(val);
    const maxRows = parsedData[idx]?.rawRows.length || 0;
    const input = document.querySelector(`.header-row-input[data-file-idx="${idx}"]`);
    if (isNaN(num) || num < 1 || num > maxRows) {
        input.classList.add('invalid');
    } else {
        input.classList.remove('invalid');
        headerRowNumbers[idx] = num;
    }
}

function applyAllHeaderRows() {
    let valid = true;
    document.querySelectorAll('.header-row-input').forEach(inp => {
        const idx = parseInt(inp.dataset.fileIdx);
        const val = parseInt(inp.value);
        const maxRows = parsedData[idx]?.rawRows.length || 0;
        if (isNaN(val) || val < 1 || val > maxRows) {
            inp.classList.add('invalid'); valid = false;
        } else {
            inp.classList.remove('invalid');
            headerRowNumbers[idx] = val;
        }
    });
    if (!valid) { alert('存在无效的行号，请修正'); return; }
    buildColumnMappings();
    renderMappingTable();
}

// ==================== 删除/恢复功能 ====================
function deleteCell(fileIdx, rowIdx, colIdx, displayName) {
    const fileName = uploadedFiles[fileIdx]?.name || '未知文件';
    if (confirm(`确定要删除文件"${fileName}"中的字段"${displayName}"吗？删除后将不参与合并。`)) {
        const cellKey = `${fileIdx}_${rowIdx}_${colIdx}`;
        deletedCells[cellKey] = true;
        
        // 同时删除单元格的独立映射
        if (cellMappings[cellKey]) {
            delete cellMappings[cellKey];
        }
        
        renderMappingTable();
    }
}

function restoreCell(fileIdx, rowIdx, colIdx) {
    const cellKey = `${fileIdx}_${rowIdx}_${colIdx}`;
    if (deletedCells[cellKey]) {
        delete deletedCells[cellKey];
        renderMappingTable();
    }
}

function restoreAllDeletedCells() {
    if (Object.keys(deletedCells).length === 0) {
        alert('没有已删除的单元格');
        return;
    }
    
    if (confirm(`确定要恢复所有已删除的单元格吗？`)) {
        deletedCells = {};
        renderMappingTable();
    }
}

function showDeletedCells() {
    document.querySelectorAll('.deleted-cell').forEach(cell => {
        cell.style.display = '';
    });
}

// ==================== 映射表 ====================
function renderMappingTable() {
    if (!parsedData.length) return;
    
    const fileColumns = parsedData.map((file, fi) => {
        const headers = file.currentHeaders || [];
        const rowNum = headerRowNumbers[fi] || 1;
        const columns = [];
        headers.forEach((h, idx) => {
            if (columnHasData(file.rawRows, idx, rowNum)) {
                columns.push({
                    index: idx,
                    original: h
                });
            }
        });
        return columns;
    });
    
    const maxCols = Math.max(...fileColumns.map(cols => cols.length), 0);

    let head = '<tr><th class="checkbox-cell">✓</th><th>#</th>';
    parsedData.forEach((f, i) => {
        const shortName = f.fileName.length>15 ? f.fileName.slice(0,12)+'…' : f.fileName;
        head += `<th class="file-header column-cell" title="${f.fileName}" data-file-index="${i}">${shortName}</th>`;
    });
    head += '</tr>';
    mappingHead.innerHTML = head;

    let body = `<tr class="select-all-row"><td class="checkbox-cell"><input type="checkbox" id="selectAllCols" checked onchange="toggleAllColumns(this.checked)"></td><th>全选</th>${parsedData.map(()=>'<td></td>').join('')}</tr>`;

    for (let c = 0; c < maxCols; c++) {
        body += `<tr data-row="${c}">`;
        body += `<td class="checkbox-cell"><input type="checkbox" class="col-checkbox" data-row="${c}" checked></td>`;
        body += `<td style="font-weight:700; color:#ff6b9d; text-align:center;">${c+1}</td>`;
        
        parsedData.forEach((file, fi) => {
            const cols = fileColumns[fi] || [];
            if (c < cols.length) {
                const colInfo = cols[c];
                const orig = colInfo.original;
                // 获取显示名称（传入行号c作为rowIdx）
                const displayName = getDisplayColumnName(fi, orig, colInfo.index, c);
                const cur = displayName;
                
                // 判断是否修改过（有独立映射或与原始不同）
                const cellKey = `${fi}_${c}_${colInfo.index}`;
                const hasCellMapping = !!cellMappings[cellKey];
                const mod = hasCellMapping || (cur !== orig && orig.trim() !== '');
                
                // 判断是否会合并（多个相同名称）
                let merge = false;
                // 这里简化处理，实际可能需要更复杂的逻辑
                
                const cls = 'column-input' + (mod ? ' modified' : '');
                const sample = getSampleCell(fi, colInfo.index);
                
                const isDeleted = deletedCells[cellKey];
                const cellClass = isDeleted ? 'column-cell deleted-cell' : 'column-cell';
                
                body += `<td class="${cellClass}" data-file="${fi}" data-row="${c}" data-col="${colInfo.index}" onclick="if(${isDeleted}) restoreCell(${fi}, ${c}, ${colInfo.index})">`;
                body += `<div class="cell-content">`;
                
                // 第一行：名称 + 删除按钮
                body += `<div class="cell-name-row">`;
                body += `<span>${escapeHtml(cur)}</span>`;
                body += `<button class="cell-delete-btn" onclick="event.stopPropagation(); deleteCell(${fi}, ${c}, ${colInfo.index}, '${escapeJs(displayName)}')" title="删除此字段">✕</button>`;
                body += `</div>`;
                
                // 第二行：原名称
                body += `<div class="cell-original-row">`;
                body += `<span class="label">原：</span>`;
                body += `<span>${orig && orig.trim()!== '' ? escapeHtml(orig) : '自动生成'}</span>`;
                body += `</div>`;
                
                // 第三行：示例
                body += `<div class="cell-sample-row">`;
                body += `<span class="label">示例：</span>`;
                body += `<span title="${escapeHtml(sample)}">${escapeHtml(sample.substring(0,15))}${sample.length>15?'…':''}</span>`;
                body += `</div>`;
                
                // 输入框
                body += `<div class="cell-input-wrapper">`;
                // 添加 data-cell-key 属性用于唯一标识
                body += `<input type="text" class="${cls}" value="${escapeHtml(cur)}" 
                    data-file-index="${fi}" 
                    data-original-col="${escapeJs(displayName)}" 
                    data-col-index="${colInfo.index}"
                    data-row-index="${c}"
                    data-cell-key="${cellKey}"
                    onchange="updateCellMapping(this)" 
                    onfocus="showSuggestions(this,${fi},'${escapeJs(displayName)}')" 
                    onclick="event.stopPropagation()">`;
                body += `</div>`;
                
                body += `</div></td>`;
            } else {
                body += '<td class="no-data">-</td>';
            }
        });
        body += '</tr>';
    }
    mappingBody.innerHTML = body;
    mappingSection.classList.remove('hidden');
}

// ==================== 单元格级映射更新函数 ====================
function updateCellMapping(input) {
    const cellKey = input.dataset.cellKey;
    const newValue = input.value.trim();
    const fileIdx = parseInt(input.dataset.fileIndex);
    const colIdx = parseInt(input.dataset.colIndex);
    
    // 获取真正的原始名称
    const trueOriginalName = parsedData[fileIdx].currentHeaders[colIdx];
    
    if (newValue === trueOriginalName) {
        // 改回原始名称，删除独立映射
        delete cellMappings[cellKey];
    } else {
        // 新名称，保存映射
        cellMappings[cellKey] = newValue;
    }
    
    renderMappingTable();
}

function toggleAllColumns(checked) { 
    document.querySelectorAll('.col-checkbox').forEach(cb => cb.checked = checked); 
}

// ==================== 重置函数 ====================
function resetAllNames() { 
    // 清空单元格级映射
    cellMappings = {};
    
    // 重新构建全局映射
    parsedData.forEach((f,fi) => { 
        columnMappings[fi] = {}; 
        const filePrefix = getFileShortName(f.fileName);
        let emptyCounter = 1;
        
        f.currentHeaders.forEach((h, idx) => { 
            if (columnHasData(f.rawRows, idx, headerRowNumbers[fi] || 1)) {
                if (h && h.trim() !== '') {
                    columnMappings[fi][h] = h;
                } else {
                    const autoName = `${filePrefix}-列${emptyCounter.toString().padStart(3, '0')}`;
                    emptyCounter++;
                    columnMappings[fi][autoName] = autoName;
                    columnMappings[fi][`__empty_${idx}`] = autoName;
                }
            }
        });
    }); 
    renderMappingTable(); 
}

// ==================== 合并 ====================
function mergeFiles() {
    const checkedRows = new Set([...document.querySelectorAll('.col-checkbox:checked')].map(cb => parseInt(cb.dataset.row)));
    const finalColsSet = new Set();
    
    parsedData.forEach((file, fi) => {
        const headers = file.currentHeaders || [];
        const rowNum = headerRowNumbers[fi] || 1;
        let dataColIndex = 0;
        
        headers.forEach((orig, idx) => {
            const cellKey = `${fi}_${dataColIndex}_${idx}`;
            if (deletedCells[cellKey]) {
                dataColIndex++;
                return;
            }
            
            if (columnHasData(file.rawRows, idx, rowNum)) {
                if (checkedRows.has(dataColIndex)) {
                    // 优先使用单元格级映射
                    let target;
                    if (cellMappings[cellKey]) {
                        target = cellMappings[cellKey];
                    } else if (orig && orig.trim() !== '') {
                        target = columnMappings[fi]?.[orig] || orig;
                    } else {
                        const autoName = columnMappings[fi]?.[`__empty_${idx}`] || `${getFileShortName(file.fileName)}-列${idx+1}`;
                        target = columnMappings[fi]?.[autoName] || autoName;
                    }
                    finalColsSet.add(target);
                }
                dataColIndex++;
            }
        });
    });
    
    if (finalColsSet.size === 0) { alert('请至少选择一列'); return; }
    previewCols = [...finalColsSet];

    mergedData = [];
    parsedData.forEach((file, fi) => {
        const headerRowNum = headerRowNumbers[fi] || 1;
        const headers = file.currentHeaders || [];
        
        for (let r = headerRowNum; r < file.rawRows.length; r++) {
            const rowArr = file.rawRows[r] || [];
            // 跳过空行
            const isEmptyRow = rowArr.every(cell => cell === undefined || cell === null || String(cell).trim() === "");
            if (isEmptyRow) continue;
            
            const newRow = { __source__: file.fileName };
            previewCols.forEach(col => newRow[col] = '');
            
            headers.forEach((orig, colIdx) => {
                const cellKey = `${fi}_${colIdx}_${colIdx}`;
                if (deletedCells[cellKey]) return;
                
                // 确定目标列名
                let target;
                if (cellMappings[cellKey]) {
                    target = cellMappings[cellKey];
                } else if (orig && orig.trim() !== '') {
                    target = columnMappings[fi]?.[orig] || orig;
                } else {
                    const autoName = columnMappings[fi]?.[`__empty_${colIdx}`];
                    if (autoName) {
                        target = columnMappings[fi]?.[autoName] || autoName;
                    } else {
                        return;
                    }
                }
                
                if (previewCols.includes(target)) {
                    newRow[target] = rowArr[colIdx] !== undefined ? String(rowArr[colIdx]) : '';
                }
            });
            // 过滤合并后所有目标列均为空的行
            const hasData = previewCols.some(col => newRow[col] !== undefined && String(newRow[col]).trim() !== "");
            if (!hasData) continue;
            mergedData.push(newRow);
        }
    });

    buildColSourceMap(previewCols);
    activeFilters = {};
    regexFilter = null;
    currentPage = 1;
    renderPreview();
    previewSection.classList.remove('hidden');
    previewSection.scrollIntoView({ behavior: 'smooth' });
    updateRegexColumnSelect();
}

function buildColSourceMap(cols) {
    colSourceMap = {};
    cols.forEach(c => colSourceMap[c] = new Set());
    parsedData.forEach((file, fi) => {
        const headers = file.currentHeaders || [];
        headers.forEach((orig, idx) => {
            const cellKey = `${fi}_${idx}_${idx}`;
            if (deletedCells[cellKey]) return;
            
            let target;
            if (cellMappings[cellKey]) {
                target = cellMappings[cellKey];
            } else if (orig && orig.trim() !== '') {
                target = columnMappings[fi]?.[orig] || orig;
            } else {
                const autoName = columnMappings[fi]?.[`__empty_${idx}`];
                if (autoName) {
                    target = columnMappings[fi]?.[autoName] || autoName;
                } else {
                    return;
                }
            }
            if (colSourceMap[target]) colSourceMap[target].add(file.fileName);
        });
    });
}

// ==================== 正则校验 ====================
function updateRegexColumnSelect() {
    regexColumnSelect.innerHTML = previewCols.map(c => `<option value="${escapeJs(c)}">${escapeHtml(c)}</option>`).join('');
}

function applyRegexFilter(isMatch) {
    const selected = regexColumnSelect.value;
    if (!selected) { alert('请选择一列'); return; }
    const patternStr = regexPattern.value.trim();
    if (!patternStr) { alert('请输入正则表达式'); return; }
    let regex;
    try { regex = new RegExp(patternStr); } catch(e) { alert('无效的正则表达式'); return; }

    regexFilter = { column: selected, pattern: regex, isMatch: isMatch };
    currentPage = 1;
    renderPreviewBody();
    renderFilterStatus();
    renderPagination();
}

function clearRegexFilter() {
    regexFilter = null;
    currentPage = 1;
    renderPreviewBody();
    renderFilterStatus();
    renderPagination();
}

// ==================== 预览渲染 ====================
function renderPreview() {
    renderPreviewHeader();
    renderPreviewBody();
    renderFilterStatus();
    renderPagination();
    setTimeout(adjustFilterRowTop, 30);
    setTimeout(adjustFilterRowTop, 100);
    setTimeout(adjustFilterRowTop, 300);
}

function renderPreviewHeader() {
    let headerRow = '<tr><th class="frozen-col">#</th>';
    previewCols.forEach(c => {
        const info = getSourceInfo(c);
        const isEditing = editingHeader === c;
        const isPopOpen = openSourcePopover === c;
        const badgeClass = info.isAll ? 'all-files' : 'partial-files';
        const shortLabel = info.isAll ? '📁 所有文件' : `📁 ${info.files.length} 个文件`;

        headerRow += `<th class="header-cell" style="position:relative">`;
        if (isEditing) {
            headerRow += `<input class="header-edit-input" id="headerEditInput" value="${escapeHtml(c)}" onkeydown="onHeaderEditKey(event, '${escapeJs(c)}')" />`;
            headerRow += `<div class="header-edit-actions"><button class="confirm-btn" onclick="confirmHeaderEdit('${escapeJs(c)}')">确认</button><button class="cancel-btn" onclick="cancelHeaderEdit()">取消</button></div>`;
        } else {
            headerRow += `<div class="header-top-row">`;
            headerRow += `<span class="header-name" ondblclick="startHeaderEdit('${escapeJs(c)}')" title="双击修改列名">${escapeHtml(c)}</span>`;
            headerRow += `<button class="header-delete-btn" onclick="requestDeleteColumn('${escapeJs(c)}')" title="删除此列">✕</button>`;
            headerRow += `</div>`;
        }
        headerRow += `<br><span class="source-badge ${badgeClass}" onclick="toggleSourcePopover(event, '${escapeJs(c)}')">${shortLabel} <span class="badge-arrow${isPopOpen?' open':''}">▼</span></span>`;
        if (isPopOpen) {
            headerRow += `<div class="source-popover"><div class="source-popover-title">来源文件</div>`;
            if (info.isAll) headerRow += `<div style="color:#28a745;font-size:0.85rem;margin-bottom:6px">✅ 所有 ${info.files.length} 个文件均包含此列</div>`;
            headerRow += `<ul class="source-popover-list">${info.files.map(f => `<li>📄 ${escapeHtml(f)}</li>`).join('')}</ul></div>`;
        }
        headerRow += '</th>';
    });
    headerRow += '<th>来源</th></tr>';

    let filterRow = '<tr class="filter-row"><th class="frozen-col" style="font-size:0.7rem;color:#3b2e6b">🔍</th>';
    previewCols.forEach(c => { filterRow += `<th>${buildFilterCellHtml(c)}</th>`; });
    filterRow += `<th>${buildFilterCellHtml('__source__')}</th></tr>`;

    document.getElementById('previewHead').innerHTML = headerRow + filterRow;
    adjustFilterRowTop();
}

function buildFilterCellHtml(col) {
    const d = activeFilters[col] || { text: '', mode: 'contains' };
    const isOpen = openFilterDropdown === col;
    const hasMode = d.mode === 'empty' || d.mode === 'notempty';
    const inputActive = d.mode === 'contains' && d.text.trim() ? ' active' : '';
    const inputDisabled = hasMode ? ' disabled' : '';
    const placeholder = hasMode ? (d.mode === 'empty' ? '🔍 为空' : '🔍 不为空') : '筛选...';
    const inputVal = hasMode ? '' : escapeHtml(d.text);
    let html = `<div class="filter-cell">`;
    html += `<input type="text" class="filter-text-input${inputActive}" data-col="${escapeHtml(col)}" placeholder="${placeholder}" value="${inputVal}"${inputDisabled} oninput="onFilterTextInput('${escapeJs(col)}', this.value)">`;
    html += `<div class="filter-mode-btn${hasMode ? ' has-mode' : ''}" onclick="toggleFilterDropdown(event, '${escapeJs(col)}')" title="筛选模式">▾`;
    if (isOpen) {
        html += `<div class="filter-dropdown">`;
        html += `<div class="filter-dropdown-item${d.mode==='contains'?' selected':''}" onclick="setFilterMode(event,'${escapeJs(col)}','contains')"><span class="fi-icon">🔤</span> 模糊搜索</div>`;
        html += `<div class="filter-dropdown-item${d.mode==='empty'?' selected':''}" onclick="setFilterMode(event,'${escapeJs(col)}','empty')"><span class="fi-icon">⬜</span> 为空</div>`;
        html += `<div class="filter-dropdown-item${d.mode==='notempty'?' selected':''}" onclick="setFilterMode(event,'${escapeJs(col)}','notempty')"><span class="fi-icon">✅</span> 不为空</div>`;
        if ((d.mode!=='contains' || d.text) && d.mode) html += `<div class="filter-dropdown-item" onclick="clearSingleFilter(event,'${escapeJs(col)}')" style="color:#dc3545"><span class="fi-icon">🗑️</span> 清除筛选</div>`;
        html += `</div>`;
    }
    html += `</div></div>`;
    return html;
}

function renderFilterRow() {
    const filterThs = document.querySelectorAll('#previewHead tr.filter-row th');
    if (!filterThs.length) return;
    previewCols.forEach((c, i) => { filterThs[i + 1].innerHTML = buildFilterCellHtml(c); });
    filterThs[filterThs.length - 1].innerHTML = buildFilterCellHtml('__source__');
}

function renderPreviewBody() {
    const filtered = getFilteredData();
    const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
    if (currentPage > totalPages) currentPage = totalPages;
    const start = (currentPage - 1) * pageSize;
    const pageRows = filtered.slice(start, start + pageSize);

    let tbody = pageRows.map((r, i) =>
        `<tr><td class="frozen-col">${start + i + 1}</td>${
            previewCols.map(c => `<td>${escapeHtml(r[c] || '')}</td>`).join('')
        }<td>${escapeHtml(r.__source__)}</td></tr>`
    ).join('');
    if (!pageRows.length && filtered.length === 0) {
        tbody = `<tr><td class="frozen-col">-</td><td colspan="${previewCols.length+1}" style="text-align:center;color:#ff6b9d;padding:30px;font-weight:600;">✨ 无匹配数据 ✨</td></tr>`;
    }
    document.getElementById('previewBody').innerHTML = tbody;
}

function getFilteredData() {
    let filtered = mergedData;

    const activeCols = Object.keys(activeFilters).filter(col => {
        const d = activeFilters[col];
        if (d.mode === 'empty' || d.mode === 'notempty') return true;
        return d.mode === 'contains' && d.text.trim() !== '';
    });
    if (activeCols.length) {
        filtered = filtered.filter(row => activeCols.every(col => {
            const d = activeFilters[col];
            const val = String(row[col] ?? '');
            if (d.mode === 'empty') return val.trim() === '';
            if (d.mode === 'notempty') return val.trim() !== '';
            return val.toLowerCase().includes(d.text.toLowerCase().trim());
        }));
    }

    if (regexFilter) {
        const { column, pattern, isMatch } = regexFilter;
        filtered = filtered.filter(row => {
            const val = String(row[column] ?? '');
            const matched = pattern.test(val);
            return isMatch ? matched : !matched;
        });
    }
    return filtered;
}

function getSourceInfo(colName) {
    const sources = colSourceMap[colName];
    if (!sources) return { isAll: false, label: '未知', files: [] };
    const totalFiles = new Set(parsedData.map(f => f.fileName)).size;
    const fileArr = [...sources];
    const isAll = fileArr.length >= totalFiles && totalFiles > 0;
    return { isAll, label: isAll ? '所有文件' : `${fileArr.length}/${totalFiles} 个文件`, files: fileArr };
}

function onFilterTextInput(col, value) {
    activeFilters[col] = { text: value, mode: 'contains' };
    currentPage = 1;
    renderPreviewBody(); renderFilterStatus(); renderPagination();
}

function toggleFilterDropdown(e, col) {
    e.stopPropagation();
    openFilterDropdown = openFilterDropdown === col ? null : col;
    renderFilterRow();
}
function setFilterMode(e, col, mode) {
    e.stopPropagation();
    const prev = activeFilters[col] || { text: '', mode: 'contains' };
    if (prev.mode === mode) activeFilters[col] = { text: '', mode: 'contains' };
    else activeFilters[col] = { text: prev.text || '', mode };
    openFilterDropdown = null; currentPage = 1;
    renderFilterRow(); renderPreviewBody(); renderFilterStatus(); renderPagination();
}
function clearSingleFilter(e, col) {
    e.stopPropagation();
    delete activeFilters[col]; openFilterDropdown = null; currentPage = 1;
    renderFilterRow(); renderPreviewBody(); renderFilterStatus(); renderPagination();
}
function renderFilterStatus() {
    const el = document.getElementById('filterStatus');
    const filterCount = Object.keys(activeFilters).filter(c => {
        const d = activeFilters[c]; return (d.mode==='empty'||d.mode==='notempty') || (d.mode==='contains' && d.text.trim()!=='');
    }).length;
    const regexActive = regexFilter !== null;
    if (!filterCount && !regexActive) { el.innerHTML = ''; return; }
    const filtered = getFilteredData();
    let msg = `🔍 已启用 ${filterCount} 个列筛选`;
    if (regexActive) msg += ` + 正则校验`;
    msg += `，显示 ${filtered.length} / ${mergedData.length} 行 `;
    el.innerHTML = `<div class="filter-status">${msg} <button class="clear-filters-btn" onclick="clearAllFilters()">清除所有筛选</button></div>`;
}
function clearAllFilters() {
    activeFilters = {}; regexFilter = null; currentPage = 1;
    renderPreviewHeader(); renderPreviewBody(); renderFilterStatus(); renderPagination();
}

// 分页
function renderPagination() {
    const filtered = getFilteredData();
    const total = filtered.length;
    const totalPages = Math.max(1, Math.ceil(total / pageSize));
    const start = (currentPage - 1) * pageSize + 1;
    const end = Math.min(currentPage * pageSize, total);

    let pageBtns = '';
    const maxVisible = 7;
    let pages = [];
    if (totalPages <= maxVisible) {
        for (let i = 1; i <= totalPages; i++) pages.push(i);
    } else {
        pages.push(1);
        let lo = Math.max(2, currentPage - 1);
        let hi = Math.min(totalPages - 1, currentPage + 1);
        if (currentPage <= 3) { lo = 2; hi = 4; }
        if (currentPage >= totalPages - 2) { lo = totalPages - 3; hi = totalPages - 1; }
        if (lo > 2) pages.push('...');
        for (let i = lo; i <= hi; i++) pages.push(i);
        if (hi < totalPages - 1) pages.push('...');
        pages.push(totalPages);
    }
    pages.forEach(p => {
        if (p === '...') {
            pageBtns += `<span style="padding:0 4px;color:#ff6b9d">...</span>`;
        } else {
            pageBtns += `<button class="page-btn${p===currentPage?' active':''}" onclick="goToPage(${p})">${p}</button>`;
        }
    });

    const sizeOptions = PAGE_SIZES.map(s => `<option value="${s}"${s===pageSize?' selected':''}>${s} 条/页</option>`).join('');

    document.getElementById('paginationBar').innerHTML = `<div class="pagination-bar">
        <div class="pagination-info">共 <strong>${total}</strong> 条数据，第 <strong>${total>0?start:0}</strong>-<strong>${end}</strong> 条</div>
        <div class="pagination-controls">
            <button class="page-btn" onclick="goToPage(1)" ${currentPage<=1?'disabled':''}>&laquo;</button>
            <button class="page-btn" onclick="goToPage(${currentPage-1})" ${currentPage<=1?'disabled':''}>&lsaquo;</button>
            ${pageBtns}
            <button class="page-btn" onclick="goToPage(${currentPage+1})" ${currentPage>=totalPages?'disabled':''}>&rsaquo;</button>
            <button class="page-btn" onclick="goToPage(${totalPages})" ${currentPage>=totalPages?'disabled':''}>&raquo;</button>
        </div>
        <div class="page-size-wrapper">
            <span class="page-size-label">每页显示</span>
            <select class="page-size-select" onchange="changePageSize(this.value)">${sizeOptions}</select>
        </div>
    </div>`;
}

function goToPage(p) { currentPage = p; renderPreviewBody(); renderPagination(); document.getElementById('previewWrapper').scrollTop = 0; }
function changePageSize(newSize) { pageSize = parseInt(newSize); currentPage = 1; renderPreviewBody(); renderPagination(); }

function adjustFilterRowTop() {
    const firstTh = document.querySelector('#previewHead tr:first-child th');
    if (!firstTh) return;
    const h = firstTh.offsetHeight;
    document.querySelectorAll('#previewHead tr.filter-row th').forEach(th => {
        th.style.top = h + 'px';
    });
}

// ==================== 表头编辑 + 智能冲突校验 ====================
function startHeaderEdit(col) { editingHeader = col; renderPreviewHeader(); }
function cancelHeaderEdit() { editingHeader = null; renderPreviewHeader(); }
function onHeaderEditKey(e, oldCol) {
    if (e.key === 'Enter') { e.preventDefault(); confirmHeaderEdit(oldCol); }
    if (e.key === 'Escape') { e.preventDefault(); cancelHeaderEdit(); }
}

function checkCellConflicts(oldCol, newCol) {
    const conflicts = [];
    mergedData.forEach((row, index) => {
        const oldVal = row[oldCol] !== undefined ? String(row[oldCol]).trim() : '';
        const newVal = row[newCol] !== undefined ? String(row[newCol]).trim() : '';
        
        if (newVal !== '' && oldVal !== '' && oldVal !== newVal) {
            conflicts.push({
                rowIndex: index + 1,
                sourceFile: row.__source__,
                oldValue: oldVal,
                targetValue: newVal
            });
        }
    });
    return conflicts;
}

function confirmHeaderEdit(oldCol) {
    const input = document.getElementById('headerEditInput');
    if (!input) return;
    const newCol = input.value.trim();
    if (!newCol) { alert('列名不能为空'); return; }
    if (newCol === oldCol) { editingHeader = null; renderPreviewHeader(); return; }
    
    const willMerge = previewCols.includes(newCol);
    
    if (willMerge) {
        const conflicts = checkCellConflicts(oldCol, newCol);
        
        if (conflicts.length > 0) {
            let conflictHtml = '<div class="conflict-preview"><table><tr><th>行号</th><th>来源</th><th>原值</th><th>目标列已有值</th></tr>';
            conflicts.slice(0, 10).forEach(c => {
                conflictHtml += `<tr><td>${c.rowIndex}</td><td>${escapeHtml(c.sourceFile)}</td><td>${escapeHtml(c.oldValue)}</td><td>${escapeHtml(c.targetValue)}</td></tr>`;
            });
            if (conflicts.length > 10) {
                conflictHtml += `<tr><td colspan="4">... 还有 ${conflicts.length - 10} 条冲突</td></tr>`;
            }
            conflictHtml += '</table></div>';
            
            showConflictDialog(oldCol, newCol, conflicts.length, conflictHtml);
            return;
        }
    }
    
    showRenameDialog(oldCol, newCol, willMerge);
}

function showConflictDialog(oldCol, newCol, conflictCount, conflictHtml) {
    const overlay = document.createElement('div'); overlay.className = 'confirm-overlay';
    overlay.innerHTML = `<div class="confirm-dialog">
        <h3 style="color:#ff6b9d;">⚠️ 数据冲突警告</h3>
        <div class="alert-danger">
            发现 <strong>${conflictCount}</strong> 处数据冲突！<br>
            将列 <strong>"${escapeHtml(oldCol)}"</strong> 合并到 <strong>"${escapeHtml(newCol)}"</strong> 时，以下单元格已有值且不相同：
        </div>
        ${conflictHtml}
        <p style="color:#888;margin-top:10px;">根据规则，只有当目标单元格为空时才允许合并。请修改列名或处理冲突后重试。</p>
        <div class="dialog-btns">
            <button class="d-cancel" id="dialogCancel">关闭</button>
        </div>
    </div>`;
    document.body.appendChild(overlay);
    document.getElementById('dialogCancel').onclick = () => overlay.remove();
}

function showRenameDialog(oldCol, newCol, willMerge) {
    const overlay = document.createElement('div'); overlay.className = 'confirm-overlay';
    let warnHtml = willMerge ? `<div class="merge-warning">⚠️ 已存在名为 <strong>"${escapeHtml(newCol)}"</strong> 的列，确认后两列数据将会合并（仅当目标单元格为空时填充）。</div>` : '';
    overlay.innerHTML = `<div class="confirm-dialog"><h3 style="color:#00bbf9;">✏️ 确认修改列名</h3><p><strong>${escapeHtml(oldCol)}</strong> → <strong>${escapeHtml(newCol)}</strong></p>${warnHtml}<p style="color:#888;">此操作将更新合并数据。</p><div class="dialog-btns"><button class="d-cancel" id="dialogCancel">取消</button><button class="d-confirm" id="dialogConfirm">${willMerge ? '确认合并' : '确认修改'}</button></div></div>`;
    document.body.appendChild(overlay);
    document.getElementById('dialogCancel').onclick = () => overlay.remove();
    document.getElementById('dialogConfirm').onclick = () => { overlay.remove(); applyHeaderRename(oldCol, newCol, willMerge); };
}

function applyHeaderRename(oldCol, newCol, willMerge) {
    editingHeader = null;
    
    if (willMerge) {
        mergedData.forEach(row => {
            const oldVal = row[oldCol] !== undefined ? String(row[oldCol]).trim() : '';
            const newVal = row[newCol] !== undefined ? String(row[newCol]).trim() : '';
            
            if (newVal === '' && oldVal !== '') {
                row[newCol] = oldVal;
            }
            delete row[oldCol];
        });
        
        previewCols = previewCols.filter(c => c !== oldCol);
    } else {
        mergedData.forEach(row => {
            row[newCol] = row[oldCol];
            delete row[oldCol];
        });
        previewCols = previewCols.map(c => c === oldCol ? newCol : c);
    }
    
    if (activeFilters[oldCol]) {
        if (!willMerge || !activeFilters[newCol]) activeFilters[newCol] = activeFilters[oldCol];
        delete activeFilters[oldCol];
    }
    
    // 注意：这里不修改 cellMappings，因为单元格级映射是独立的
    
    buildColSourceMap(previewCols);
    openSourcePopover = null; currentPage = 1;
    updateRegexColumnSelect();
    renderPreview();
}

function requestDeleteColumn(col) {
    const overlay = document.createElement('div'); overlay.className = 'confirm-overlay';
    overlay.innerHTML = `<div class="confirm-dialog"><h3 style="color:#ff6b9d;">🗑️ 确认删除列</h3><div class="delete-warning">确定要删除列 <strong>"${escapeHtml(col)}"</strong> 吗？<br>删除后该列将不参与数据合并和导出。</div><div class="dialog-btns"><button class="d-cancel" id="dialogCancel">取消</button><button class="d-danger" id="dialogConfirm">确认删除</button></div></div>`;
    document.body.appendChild(overlay);
    document.getElementById('dialogCancel').onclick = () => overlay.remove();
    document.getElementById('dialogConfirm').onclick = () => { overlay.remove(); applyDeleteColumn(col); };
}
function applyDeleteColumn(col) {
    previewCols = previewCols.filter(c => c !== col);
    mergedData.forEach(row => { delete row[col]; });
    delete activeFilters[col];
    buildColSourceMap(previewCols);
    openSourcePopover = null; editingHeader = null; currentPage = 1;
    updateRegexColumnSelect();
    renderPreview();
}
function toggleSourcePopover(e, col) {
    e.stopPropagation();
    openSourcePopover = openSourcePopover === col ? null : col;
    renderPreviewHeader();
}

// 下载
function downloadFile(fmt) {
    const exp = mergedData.map(r => {
        const n = {};
        previewCols.forEach(c => { n[c] = r[c] ?? ''; });
        return n;
    });
    const ws = XLSX.utils.json_to_sheet(exp);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '合并数据');
    XLSX.writeFile(wb, `merged_${new Date().toISOString().slice(0,10)}.${fmt}`);
}

function clearAll() {
    uploadedFiles = []; parsedData = []; columnMappings = {}; mergedData = [];
    headerRowNumbers = {}; activeFilters = {}; previewCols = []; colSourceMap = {};
    deletedCells = {};
    cellMappings = {};
    regexFilter = null; editingHeader = null; openSourcePopover = null; openFilterDropdown = null;
    currentPage = 1; pageSize = 100;
    fileList.innerHTML = ''; mappingSection.classList.add('hidden'); previewSection.classList.add('hidden'); fileInput.value = '';
    document.getElementById('paginationBar').innerHTML = '';
}

function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escapeJs(s) { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

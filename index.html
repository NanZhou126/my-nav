<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧰</text></svg>"> 
<title> 工具导航 </title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap');

  :root {
    --bg: #f0f2f5;
    --sidebar-bg: #ffffff;
    --card-bg: #ffffff;
    --primary: #4f6ef7;
    --primary-light: #eef1ff;
    --text: #1a1d23;
    --text-muted: #6b7280;
    --border: #e5e7eb;
    --shadow-hover: 0 6px 20px rgba(79,110,247,0.15);
    --sidebar-w: 220px;
    --header-h: 60px;
    --resizer-w: 5px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    position: fixed; top: 0; left: 0; right: 0;
    height: var(--header-h);
    background: #fff; border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 24px; gap: 16px;
    z-index: 200;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .logo {
    font-size: 1.15rem; font-weight: 700;
    color: var(--primary); white-space: nowrap;
    display: flex; align-items: center; gap: 8px;
  }
  .search-bar { flex: 1; max-width: 420px; position: relative; }
  .search-bar input {
    width: 100%; padding: 8px 16px 8px 38px;
    border: 1.5px solid var(--border); border-radius: 24px;
    font-size: 0.9rem; outline: none;
    background: var(--bg); color: var(--text);
    transition: border-color 0.2s, box-shadow 0.2s;
    font-family: inherit;
  }
  .search-bar input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(79,110,247,0.1);
    background: #fff;
  }
  .search-icon {
    position: absolute; left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted); font-size: 0.95rem; pointer-events: none;
  }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .admin-toggle-btn {
    padding: 7px 16px; border-radius: 20px;
    border: 1.5px solid var(--border);
    background: #fff; color: var(--text-muted);
    font-size: 0.85rem; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; gap: 6px;
    transition: all 0.2s; font-family: inherit;
  }
  .admin-toggle-btn:hover { border-color: var(--primary); color: var(--primary); }
  .admin-toggle-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

  /* LAYOUT */
  .layout {
    display: flex;
    margin-top: var(--header-h);
    min-height: calc(100vh - var(--header-h));
  }

  /* SIDEBAR */
  aside {
    width: var(--sidebar-w);
    min-width: 140px; max-width: 460px;
    background: var(--sidebar-bg);
    position: fixed;
    top: var(--header-h); left: 0; bottom: 0;
    overflow-y: auto; overflow-x: hidden;
    padding: 14px 10px 20px;
    z-index: 100;
  }
  aside::-webkit-scrollbar { width: 4px; }
  aside::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .cat-label {
    font-size: 0.72rem; font-weight: 600;
    color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 0.08em; padding: 6px 10px 6px;
  }

  .cat-item {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 10px; border-radius: 10px;
    cursor: pointer; font-size: 0.875rem; font-weight: 500;
    color: var(--text-muted); transition: all 0.15s;
    margin-bottom: 2px; user-select: none;
  }
  .cat-item:hover { background: var(--primary-light); color: var(--primary); }
  .cat-item.active { background: var(--primary-light); color: var(--primary); font-weight: 700; }

  .cat-expand-btn {
    width: 16px; height: 16px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px; color: var(--text-muted);
    font-size: 0.55rem; transition: all 0.15s; cursor: pointer;
  }
  .cat-expand-btn:hover { background: rgba(0,0,0,0.07); color: var(--primary); }
  .cat-expand-ph { width: 16px; flex-shrink: 0; }

  .cat-icon { font-size: 0.95rem; width: 18px; text-align: center; flex-shrink: 0; }
  .cat-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cat-count {
    background: var(--border); color: var(--text-muted);
    font-size: 0.7rem; font-weight: 700;
    padding: 1px 6px; border-radius: 10px;
    min-width: 20px; text-align: center; flex-shrink: 0;
  }
  .cat-item.active .cat-count { background: var(--primary); color: #fff; }

  .cat-admin-btns { display: none; gap: 3px; flex-shrink: 0; }
  body.admin-mode .cat-admin-btns { display: flex; }
  .cat-admin-btn {
    width: 20px; height: 20px; border: none; border-radius: 5px;
    cursor: pointer; font-size: 0.65rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .cat-admin-btn.edit { background: #e0e7ff; color: var(--primary); }
  .cat-admin-btn.edit:hover { background: var(--primary); color: #fff; }
  .cat-admin-btn.del  { background: #fee2e2; color: #ef4444; }
  .cat-admin-btn.del:hover  { background: #ef4444; color: #fff; }

  .add-cat-btn {
    display: none; width: 100%; margin-top: 10px;
    padding: 8px; border: 1.5px dashed var(--border);
    border-radius: 10px; background: transparent;
    color: var(--text-muted); font-size: 0.85rem;
    cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .add-cat-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
  body.admin-mode .add-cat-btn { display: block; }

  /* tree connector line */
  .cat-subtree { position: relative; }
  .cat-subtree::before {
    content: ''; position: absolute;
    left: 8px; top: 0; bottom: 4px;
    width: 1px; background: var(--border);
    pointer-events: none;
  }

  /* RESIZER */
  .resizer {
    width: var(--resizer-w);
    position: fixed;
    top: var(--header-h); bottom: 0;
    left: var(--sidebar-w);
    cursor: col-resize;
    z-index: 150;
    display: flex; align-items: center; justify-content: center;
    background: transparent;
    transition: background 0.15s;
  }
  .resizer::after {
    content: ''; width: 1px; height: 100%;
    background: var(--border);
    transition: background 0.15s, width 0.15s;
    pointer-events: none;
  }
  .resizer:hover::after, .resizer.dragging::after {
    background: var(--primary); width: 2px;
  }
  .resizer:hover, .resizer.dragging { background: rgba(79,110,247,0.05); }
  .resizer-grip {
    position: absolute; top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 3px;
    pointer-events: none; opacity: 0; transition: opacity 0.15s;
  }
  .resizer:hover .resizer-grip, .resizer.dragging .resizer-grip { opacity: 1; }
  .resizer-grip span {
    width: 3px; height: 3px; border-radius: 50%;
    background: var(--primary); display: block;
  }

  /* MAIN */
  main {
    margin-left: calc(var(--sidebar-w) + var(--resizer-w));
    flex: 1; padding: 28px 32px; min-width: 0;
  }
  .section-header {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 20px;
  }
  .section-title {
    font-size: 1.2rem; font-weight: 700;
    display: flex; align-items: center; gap: 10px;
  }
  .add-tool-btn {
    display: none; align-items: center; gap: 6px;
    padding: 8px 18px; background: var(--primary);
    color: #fff; border: none; border-radius: 20px;
    font-size: 0.88rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(79,110,247,0.3);
    font-family: inherit;
  }
  .add-tool-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(79,110,247,0.4); }
  body.admin-mode .add-tool-btn { display: flex; }

  /* CARDS */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }
  .tool-card {
    background: var(--card-bg); border: 1.5px solid var(--border);
    border-radius: 14px; padding: 20px;
    cursor: pointer; transition: all 0.2s;
    position: relative; display: flex;
    flex-direction: column; gap: 10px;
    text-decoration: none; color: inherit;
  }
  .tool-card:hover {
    border-color: var(--primary);
    box-shadow: var(--shadow-hover);
    transform: translateY(-2px);
  }
  .card-top { display: flex; align-items: flex-start; gap: 12px; }
  .card-icon {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; flex-shrink: 0;
  }
  .card-info { flex: 1; min-width: 0; }
  .card-name {
    font-size: 0.95rem; font-weight: 700; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 4px;
  }
  .card-tags { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
  .card-cat-tag {
    font-size: 0.72rem; font-weight: 600;
    color: var(--primary); background: var(--primary-light);
    padding: 2px 8px; border-radius: 6px; display: inline-block;
  }
  .card-type-tag {
    font-size: 0.68rem; font-weight: 700;
    padding: 2px 7px; border-radius: 6px;
    display: inline-flex; align-items: center; gap: 3px;
  }
  .card-type-tag.url  { color: #0891b2; background: #e0f7fa; }
  .card-type-tag.html { color: #059669; background: #d1fae5; }
  .card-desc {
    font-size: 0.82rem; color: var(--text-muted); line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-admin-overlay {
    display: none; position: absolute;
    top: 8px; right: 8px; gap: 5px;
  }
  body.admin-mode .card-admin-overlay { display: flex; }
  .card-edit-btn, .card-del-btn {
    width: 26px; height: 26px; border: none; border-radius: 7px;
    cursor: pointer; font-size: 0.75rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }
  .card-edit-btn { background: #fff; color: var(--primary); }
  .card-edit-btn:hover { background: var(--primary); color: #fff; }
  .card-del-btn  { background: #fff; color: #ef4444; }
  .card-del-btn:hover  { background: #ef4444; color: #fff; }
  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--text-muted); grid-column: 1/-1;
  }
  .empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 9999; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 20px;
    padding: 28px 32px; width: 90%; max-width: 480px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    animation: modalIn 0.2s ease;
    max-height: 90vh; overflow-y: auto;
  }
  @keyframes modalIn {
    from { transform: scale(0.94); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }
  .modal h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; }

  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block; font-size: 0.83rem; font-weight: 600;
    color: var(--text-muted); margin-bottom: 6px;
  }
  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%; padding: 10px 14px;
    border: 1.5px solid var(--border); border-radius: 10px;
    font-size: 0.9rem; font-family: inherit;
    outline: none; color: var(--text);
    transition: border-color 0.2s; background: #fff;
  }
  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(79,110,247,0.1);
  }
  .form-group textarea { resize: vertical; min-height: 72px; }

  .type-selector {
    display: flex; border: 1.5px solid var(--border);
    border-radius: 10px; overflow: hidden; background: var(--bg);
  }
  .type-selector-btn {
    flex: 1; padding: 9px 0; border: none;
    background: transparent; font-size: 0.9rem;
    font-family: inherit; font-weight: 500;
    color: var(--text-muted); cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .type-selector-btn.active { background: var(--primary); color: #fff; font-weight: 700; }
  .type-selector-btn:not(.active):hover { background: var(--primary-light); color: var(--primary); }

  .emoji-picker-row { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 8px; }
  .emoji-opt {
    width: 36px; height: 36px; border: 1.5px solid var(--border);
    border-radius: 9px; font-size: 1.15rem;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s;
  }
  .emoji-opt:hover, .emoji-opt.selected { border-color: var(--primary); background: var(--primary-light); }

  .color-picker-row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .color-opt {
    width: 28px; height: 28px; border-radius: 7px;
    border: 2px solid transparent; cursor: pointer;
    transition: all 0.15s; outline: 1px solid #ddd;
  }
  .color-opt:hover, .color-opt.selected { border-color: var(--primary); transform: scale(1.2); outline-color: var(--primary); }

  .modal-btns {
    display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px;
  }
  .btn-cancel {
    padding: 9px 20px; border: 1.5px solid var(--border);
    border-radius: 10px; background: #fff;
    color: var(--text-muted); font-size: 0.9rem; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  .btn-cancel:hover { border-color: var(--text-muted); }
  .btn-confirm {
    padding: 9px 24px; border: none; border-radius: 10px;
    background: var(--primary); color: #fff;
    font-size: 0.9rem; font-weight: 600; cursor: pointer;
    box-shadow: 0 2px 8px rgba(79,110,247,0.3); font-family: inherit;
  }
  .btn-confirm:hover { box-shadow: 0 4px 14px rgba(79,110,247,0.4); }

  @media (max-width: 768px) {
    aside, .resizer { display: none; }
    main { margin-left: 0 !important; padding: 20px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">🧰 工具导航</div>
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="搜索工具名称或描述…" oninput="handleSearch()">
  </div>
  <div class="header-right">
    <button class="admin-toggle-btn" id="adminToggleBtn" onclick="toggleAdminMode()">⚙️ 管理</button>
    <button class="admin-toggle-btn" id="ghConfigBtn" onclick="openGhConfigModal()" title="GitHub 数据库配置（未配置）" style="display:none">🔗 GitHub</button>
  </div>
</header>

<div class="layout">
  <aside id="sidebar">
    <div class="cat-label">分类</div>
    <div id="catList"></div>
    <button class="add-cat-btn" onclick="openAddCatModal()">＋ 新增分类</button>
  </aside>

  <div class="resizer" id="resizer">
    <div class="resizer-grip">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>

  <main id="mainArea">
    <div class="section-header">
      <div class="section-title">
        <span id="sectionIcon">🏠</span>
        <span id="sectionTitle">全部工具</span>
      </div>
      <button class="add-tool-btn" onclick="openAddToolModal()">＋ 添加工具</button>
    </div>
    <div class="cards-grid" id="cardsGrid"></div>
  </main>
</div>

<!-- 工具弹窗 -->
<div class="modal-overlay" id="toolModal">
  <div class="modal">
    <h3 id="toolModalTitle">➕ 添加工具</h3>
    <div class="form-group">
      <label>类型 *</label>
      <div class="type-selector">
        <button class="type-selector-btn active" id="typeHtmlBtn" onclick="switchToolType('html')">⚙️ 功能</button>
        <button class="type-selector-btn" id="typeUrlBtn" onclick="switchToolType('url')">🌐 网址</button>
      </div>
    </div>
    <div class="form-group">
      <label>名称 *</label>
      <input type="text" id="toolName" placeholder="例：EXCEL合并工具">
    </div>
    <div class="form-group">
      <label>链接 *</label>
      <input type="text" id="toolUrl" placeholder="例：tools/EXCEL合并.html">
    </div>
    <div class="form-group">
      <label>简短描述</label>
      <textarea id="toolDesc" placeholder="一句话描述工具用途…"></textarea>
    </div>
    <div class="form-group">
      <label>所属分类</label>
      <select id="toolCat"></select>
    </div>
    <div class="form-group">
      <label>图标</label>
      <div class="emoji-picker-row" id="emojiPicker"></div>
    </div>
    <div class="form-group">
      <label>图标背景色</label>
      <div class="color-picker-row" id="colorPicker"></div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('toolModal')">取消</button>
      <button class="btn-confirm" onclick="saveToolModal()">保存</button>
    </div>
  </div>
</div>

<!-- 分类弹窗（新增 & 编辑复用） -->
<div class="modal-overlay" id="catModal">
  <div class="modal">
    <h3 id="catModalTitle">📁 新增分类</h3>
    <div class="form-group">
      <label>分类名称 *</label>
      <input type="text" id="catName" placeholder="例：数据处理">
    </div>
    <div class="form-group">
      <label>上级分类（可选）</label>
      <select id="catParent"></select>
    </div>
    <div class="form-group">
      <label>分类图标</label>
      <div class="emoji-picker-row" id="catEmojiPicker"></div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('catModal')">取消</button>
      <button class="btn-confirm" onclick="saveCatModal()">保存</button>
    </div>
  </div>
</div>

<!-- 密码弹窗 -->
<div class="modal-overlay" id="adminModal">
  <div class="modal">
    <h3>🔐 进入管理模式</h3>
    <div class="form-group">
      <label>管理员密码</label>
      <input type="password" id="adminPwdInput" placeholder="输入密码…"
             onkeydown="if(event.key==='Enter')verifyAdmin()">
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('adminModal')">取消</button>
      <button class="btn-confirm" onclick="verifyAdmin()">确认进入</button>
    </div>
  </div>
</div>

<!-- GitHub 配置弹窗 -->
<div class="modal-overlay" id="ghConfigModal">
  <div class="modal" style="max-width:520px">
    <h3>🔗 GitHub 数据库配置</h3>
    <p style="font-size:0.83rem;color:var(--text-muted);margin-bottom:18px;line-height:1.6">
      配置后，所有添加/修改操作将同步写入你的 GitHub 仓库 JSON 文件，<br>任意浏览器、任意设备打开网页都能看到最新数据。
    </p>
    <div class="form-group">
      <label>GitHub 用户名 *</label>
      <input type="text" id="ghOwner" placeholder="例：your-username">
    </div>
    <div class="form-group">
      <label>仓库名称 *</label>
      <input type="text" id="ghRepo" placeholder="例：my-nav-site">
    </div>
    <div class="form-group">
      <label>分支</label>
      <input type="text" id="ghBranch" placeholder="main">
    </div>
    <div class="form-group">
      <label>数据文件路径</label>
      <input type="text" id="ghPath" placeholder="data/nav_data.json">
    </div>
    <div class="form-group">
      <label>Personal Access Token (PAT) *
        <a href="https://github.com/settings/tokens/new?scopes=repo&description=nav-site" target="_blank"
           style="color:var(--primary);font-weight:600;margin-left:6px;font-size:0.8rem">→ 点此生成 Token</a>
      </label>
      <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
      <div style="font-size:0.78rem;color:var(--text-muted);margin-top:5px">
        ⚠️ Token 仅存储在<strong>本机浏览器</strong>，不会上传到任何服务器。建议只勾选 <code>repo</code> 权限。
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:16px">
      <button class="btn-cancel" style="flex:1" onclick="testGhConnection()">🧪 测试连接</button>
      <button class="btn-cancel" style="flex:1;color:#ef4444" onclick="clearGhConfig()">🗑 清除配置</button>
    </div>
    <div id="ghTestResult" style="display:none;padding:10px 14px;border-radius:10px;font-size:0.85rem;font-weight:600;margin-bottom:14px"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('ghConfigModal')">取消</button>
      <button class="btn-confirm" onclick="saveGhConfig()">保存配置并立即同步</button>
    </div>
  </div>
</div>

// ── 公开读取（raw.githubusercontent.com，无需 Token，所有访客可用） ────────────
async function rawLoad() {
  // 优先从本地配置读owner/repo，也支持写在HTML里的硬编码（方便部署）
  const owner  = ghConfig.owner  || RAW_OWNER;
  const repo   = ghConfig.repo   || RAW_REPO;
  const branch = ghConfig.branch || RAW_BRANCH;
  const path   = ghConfig.path   || RAW_PATH;

  const url = 'https://raw.githubusercontent.com/' + owner + '/' + repo + '/' + branch + '/' + path;
  try {
    showSyncStatus('loading', '正在加载数据…');
    const res = await fetch(url + '?t=' + Date.now()); // 防缓存
    if (!res.ok) {
      if (res.status === 404) { showSyncStatus('warn', '数据文件不存在，使用默认数据'); return null; }
      throw new Error('HTTP ' + res.status);
    }
    const json = await res.json();
    showSyncStatus('ok', '数据已加载 ✓');
    return json;
  } catch(e) {
    showSyncStatus('warn', '加载数据失败：' + e.message);
    return null;
  }
}


function ghHeaders(token) {
  return {
    'Accept': 'application/vnd.github+json',
    'X-GitHub-Api-Version': '2022-11-28',
    ...(token ? { 'Authorization': 'Bearer ' + token } : {})
  };
}

function ghApiUrl() {
  const owner = ghConfig.owner, repo = ghConfig.repo;
  const path = ghConfig.path || 'data/nav_data.json';
  const branch = ghConfig.branch || 'main';
  if (!owner || !repo) return null;
  return 'https://api.github.com/repos/' + owner + '/' + repo + '/contents/' + path + '?ref=' + branch;
}

async function ghLoad() {
  const url = ghApiUrl();
  if (!url) return null;
  try {
    showSyncStatus('loading', '正在从 GitHub 读取数据…');
    const res = await fetch(url, { headers: ghHeaders(ghConfig.token) });
    if (!res.ok) {
      if (res.status === 404) { showSyncStatus('warn', '远端文件不存在，将在首次保存时自动创建'); return null; }
      throw new Error('HTTP ' + res.status);
    }
    const json = await res.json();
    _ghFileSha = json.sha;
    const raw = Uint8Array.from(atob(json.content.replace(/\n/g, '')), c => c.charCodeAt(0));
    const decoded = JSON.parse(new TextDecoder('utf-8').decode(raw));
    showSyncStatus('ok', '已同步 GitHub 数据 ✓');
    return decoded;
  } catch(e) {
    showSyncStatus('warn', '读取 GitHub 失败：' + e.message);
    return null;
  }
}

async function ghSave(dataObj) {
  const owner = ghConfig.owner, repo = ghConfig.repo, token = ghConfig.token;
  const path = ghConfig.path || 'data/nav_data.json';
  const branch = ghConfig.branch || 'main';
  if (!owner || !repo || !token) return false;
  const url = 'https://api.github.com/repos/' + owner + '/' + repo + '/contents/' + path;
  try {
    showSyncStatus('loading', '正在保存到 GitHub…');
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(dataObj, null, 2))));
    const body = { message: '🔄 update nav_data via web', content, branch };
    if (_ghFileSha) body.sha = _ghFileSha;
    const res = await fetch(url, {
      method: 'PUT',
      headers: Object.assign({}, ghHeaders(token), { 'Content-Type': 'application/json' }),
      body: JSON.stringify(body)
    });
    if (!res.ok) { const err = await res.json(); throw new Error(err.message || 'HTTP ' + res.status); }
    const json = await res.json();
    _ghFileSha = json.content && json.content.sha;
    showSyncStatus('ok', '已保存到 GitHub ✓');
    return true;
  } catch(e) {
    showSyncStatus('error', '保存 GitHub 失败：' + e.message);
    return false;
  }
}

// ── 同步状态提示条 ────────────────────────────────────────────────────────────
let _syncTimer = null;

    el.style.cssText = 'position:fixed;bottom:20px;right:20px;z-index:9999;padding:10px 18px;border-radius:30px;font-size:0.85rem;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,0.15);transition:opacity 0.3s;display:flex;align-items:center;gap:8px;font-family:inherit;';
    document.body.appendChild(el);
  }
  const styles = { loading:{bg:'#e0f2fe',color:'#0369a1',icon:'⏳'}, ok:{bg:'#dcfce7',color:'#15803d',icon:'✅'}, warn:{bg:'#fef9c3',color:'#a16207',icon:'⚠️'}, error:{bg:'#fee2e2',color:'#dc2626',icon:'❌'} };
  const s = styles[type] || styles.ok;
  el.style.background = s.bg; el.style.color = s.color;
  el.textContent = s.icon + ' ' + msg;
  el.style.opacity = '1';
  clearTimeout(_syncTimer);

function esc(s)  {

    .replace(/&/g,'&amp;').replace(/</g,'&lt;')

// ── 树形工具 ──────────────────────────────────────────────────────────────────
// 递归获取某节点及其所有后代的 id
function getAllDescendantIds(catId) {
  const ids = [catId];
  data.categories
    .filter(c => c.parentId === catId)
    .forEach(child => ids.push(...getAllDescendantIds(child.id)));
  return ids;
}

// 获取分类（含后代）下的工具
function getToolsByCat(catId) {
  if (catId === 'all') return data.tools;
  const ids = getAllDescendantIds(catId);
  return data.tools.filter(t => ids.includes(t.cat));
}

// 判断将 catId 移到 newParentId 下是否会造成循环
function wouldCreateCycle(catId, newParentId) {
  if (!newParentId) return false;
  return getAllDescendantIds(catId).includes(newParentId);
}

// ── 侧栏（递归树） ────────────────────────────────────────────────────────────
function renderSidebar() {
  const allCount = data.tools.length;
  let html = `<div class="cat-item ${currentCat==='all'?'active':''}" onclick="selectCat('all')">
    <span class="cat-expand-ph"></span>
    <span class="cat-icon">🏠</span>
    <span class="cat-name">全部工具</span>
    <span class="cat-count">${allCount}</span>
  </div>`;
  data.categories
    .filter(c => !c.parentId)
    .forEach(cat => { html += renderCatNode(cat, 0); });
  document.getElementById('catList').innerHTML = html;
}

function renderCatNode(cat, depth) {
  const children   = data.categories.filter(c => c.parentId === cat.id);
  const hasKids    = children.length > 0;
  const isExpanded = catExpanded[cat.id] !== false;
  const count      = getToolsByCat(cat.id).length;
  const indentPx   = depth * 14;

  const expandBtn = hasKids
    ? `<span class="cat-expand-btn"
          onclick="event.stopPropagation();toggleCatExpand('${cat.id}')"
          title="${isExpanded?'收起':'展开'}">${isExpanded?'▼':'▶'}</span>`
    : `<span class="cat-expand-ph"></span>`;

  let html = `<div class="cat-item ${currentCat===cat.id?'active':''}"
    style="padding-left:${10+indentPx}px"
    onclick="selectCat('${cat.id}')">
    ${expandBtn}
    <span class="cat-icon">${cat.icon}</span>
    <span class="cat-name">${esc(cat.name)}</span>
    <span class="cat-count">${count}</span>
    <div class="cat-admin-btns">
      <button class="cat-admin-btn edit"
        onclick="event.stopPropagation();openEditCatModal('${cat.id}')"
        title="编辑分类">✏️</button>
      <button class="cat-admin-btn del"
        onclick="event.stopPropagation();deleteCat('${cat.id}')"
        title="删除分类">🗑</button>
    </div>
  </div>`;

  if (hasKids && isExpanded) {
    // 子树容器，左侧竖线偏移同父级缩进+expand按钮区域
    const lineLeft = 10 + indentPx + 8;
    html += `<div class="cat-subtree" style="margin-left:${lineLeft}px">`;
    children.forEach(child => { html += renderCatNode(child, depth + 1); });
    html += `</div>`;
  }
  return html;
}

function toggleCatExpand(catId) {
  catExpanded[catId] = catExpanded[catId] === false ? true : false;
  renderSidebar();
}

// ── 卡片 ──────────────────────────────────────────────────────────────────────

  grid.innerHTML = tools.map(t => {
    const catName = data.categories.find(c => c.id === t.cat)?.name || '';
    const isUrl   = t.type === 'url';

      ? `<span class="card-type-tag url">🌐 网址</span>`
      : `<span class="card-type-tag html">⚙️ 功能</span>`;
    return `<a class="tool-card" href="${esc(t.url)}" target="_blank" rel="noopener">
      <div class="card-admin-overlay">
        <button class="card-edit-btn"
          onclick="event.preventDefault();event.stopPropagation();openEditToolModal('${t.id}')"
          title="编辑">✏️</button>
        <button class="card-del-btn"
          onclick="event.preventDefault();event.stopPropagation();deleteTool('${t.id}')"
          title="删除">🗑</button>
      </div>
      <div class="card-top">
        <div class="card-icon" style="background:${t.color||'#f1f5f9'}">${t.icon||'🛠️'}</div>

function selectCat(catId) {

  document.getElementById('sectionTitle').textContent = catId==='all' ? '全部工具' : (cat?.name||'');
  document.getElementById('searchInput').value = '';

function handleSearch() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!q) { selectCat(currentCat); return; }
  renderCards(getToolsByCat(currentCat).filter(
    t => t.name.toLowerCase().includes(q) || (t.desc||'').toLowerCase().includes(q)

async function verifyAdmin() {
  const pwd = document.getElementById('adminPwdInput').value;
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pwd));
  const hex = [...new Uint8Array(buf)].map(x=>x.toString(16).padStart(2,'0')).join('');
  if (hex === ADMIN_PASSWORD_HASH) {
    isAdmin = true;
    document.body.classList.add('admin-mode');
    const btn = document.getElementById('adminToggleBtn');
    btn.classList.add('active');
    btn.innerHTML = '⚙️ 管理中 &nbsp;<small style="opacity:.7;font-weight:400">点击退出</small>';
    closeModal('adminModal');
    document.getElementById('ghConfigBtn').style.display = '';
  } else {
    const inp = document.getElementById('adminPwdInput');
    inp.style.borderColor = '#ef4444';
    inp.value = ''; inp.placeholder = '❌ 密码错误，请重试';
    setTimeout(() => { inp.style.borderColor=''; inp.placeholder='输入密码…'; }, 1800);
  }
}

function fillCatSelect(selectedId) {
  let opts = '';
  function walk(cats, depth) {
    cats.forEach(c => {
      const prefix = depth ? '　'.repeat(depth) + '└ ' : '';
      opts += `<option value="${c.id}" ${c.id===selectedId?'selected':''}>${prefix}${c.icon} ${c.name}</option>`;
      walk(data.categories.filter(k => k.parentId === c.id), depth + 1);
    });
  }
  walk(data.categories.filter(c => !c.parentId), 0);
  document.getElementById('toolCat').innerHTML = opts || '<option value="">（暂无分类，请先添加）</option>';
}

  switchToolType('html');
  fillCatSelect(currentCat !== 'all' ? currentCat : data.categories[0]?.id);
  buildEmojiPicker('emojiPicker', selEmoji, 'pickEmoji');
  buildColorPicker(selColor);
  openModal('toolModal');
}

function openEditToolModal(id) {
  const t = data.tools.find(x => x.id === id);
  if (!t) return;
  editingToolId = id;
  selEmoji    = t.icon  || EMOJIS[0];
  selColor    = t.color || COLORS[0];
  selToolType = t.type  || 'html';
  document.getElementById('toolModalTitle').textContent = '✏️ 编辑工具';
  document.getElementById('toolName').value = t.name;
  document.getElementById('toolUrl').value  = t.url;
  document.getElementById('toolDesc').value = t.desc || '';
  switchToolType(selToolType);
  fillCatSelect(t.cat);
  buildEmojiPicker('emojiPicker', selEmoji, 'pickEmoji');
  buildColorPicker(selColor);
  openModal('toolModal');
}

function saveToolModal() {
  const name = document.getElementById('toolName').value.trim();
  const url  = document.getElementById('toolUrl').value.trim();
  const desc = document.getElementById('toolDesc').value.trim();
  const cat  = document.getElementById('toolCat').value;
  if (!name) { alert('请填写名称'); return; }
  if (!url)  { alert('请填写链接'); return; }
  if (selToolType === 'url' && !/^https?:\/\//i.test(url)) {
    alert('网址类型的链接需以 http:// 或 https:// 开头'); return;
  }
  if (editingToolId) {
    const t = data.tools.find(x => x.id === editingToolId);
    if (t) Object.assign(t, { name, url, desc, cat, type: selToolType, icon: selEmoji, color: selColor });
  } else {
    data.tools.push({ id: genId(), name, url, desc, cat, type: selToolType, icon: selEmoji, color: selColor });
  }
  save(); closeModal('toolModal'); selectCat(currentCat);
}

function deleteTool(id) {
  if (!confirm('确定删除此工具？')) return;
  data.tools = data.tools.filter(t => t.id !== id);
  save(); selectCat(currentCat);
}

// ── 分类弹窗：构建父级下拉（树形缩进，排除指定节点） ─────────────────────────
function buildCatParentSelect(selectedParentId, excludeIds = []) {
  let opts = '<option value="">— 顶级分类（无上级）—</option>';
  function walk(cats, depth) {
    cats.forEach(c => {
      if (excludeIds.includes(c.id)) return;
      const prefix = depth ? '　'.repeat(depth) + '└ ' : '';
      opts += `<option value="${c.id}" ${c.id===selectedParentId?'selected':''}>${prefix}${c.icon} ${c.name}</option>`;
      walk(data.categories.filter(k => k.parentId === c.id), depth + 1);
    });
  }
  walk(data.categories.filter(c => !c.parentId), 0);
  document.getElementById('catParent').innerHTML = opts;
}

function openAddCatModal() {
  editingCatId = null;
  selCatEmoji  = '📁';
  document.getElementById('catModalTitle').textContent = '📁 新增分类';
  document.getElementById('catName').value = '';
  buildCatParentSelect('');
  buildEmojiPicker('catEmojiPicker', selCatEmoji, 'pickCatEmoji');
  openModal('catModal');
}

function openEditCatModal(id) {
  const cat = data.categories.find(c => c.id === id);
  if (!cat) return;
  editingCatId = id;
  selCatEmoji  = cat.icon || '📁';
  document.getElementById('catModalTitle').textContent = '✏️ 编辑分类';
  document.getElementById('catName').value = cat.name;
  // 从父级选项中排除自身及所有后代，防止循环引用
  buildCatParentSelect(cat.parentId || '', getAllDescendantIds(id));
  buildEmojiPicker('catEmojiPicker', selCatEmoji, 'pickCatEmoji');
  openModal('catModal');
}

function saveCatModal() {
  const name     = document.getElementById('catName').value.trim();
  const parentId = document.getElementById('catParent').value || null;
  if (!name) { alert('请填写分类名称'); return; }

  if (editingCatId) {
    if (wouldCreateCycle(editingCatId, parentId)) {
      alert('不能将分类移到其自身的子分类下'); return;
    }
    const cat = data.categories.find(c => c.id === editingCatId);
    if (cat) {
      cat.name = name;
      cat.icon = selCatEmoji;
      if (parentId) cat.parentId = parentId;
      else delete cat.parentId;
    }
    // 刷新标题（如果正在浏览该分类）
    if (currentCat === editingCatId) {
      document.getElementById('sectionIcon').textContent  = selCatEmoji;
      document.getElementById('sectionTitle').textContent = name;
    }
  } else {
    const newCat = { id: genId(), name, icon: selCatEmoji };
    if (parentId) newCat.parentId = parentId;
    data.categories.push(newCat);
  }

  save(); closeModal('catModal'); renderSidebar();
}

function deleteCat(id) {
  const descIds = getAllDescendantIds(id).slice(1);  // 后代（不含自身）
  const allIds  = [id, ...descIds];
  const cnt     = data.tools.filter(t => allIds.includes(t.cat)).length;

  let msg = '';
  if (descIds.length && cnt)
    msg = `该分类含 ${descIds.length} 个子分类，共 ${cnt} 个工具（工具保留，仅移出分类）。确定删除？`;
  else if (descIds.length)
    msg = `该分类含 ${descIds.length} 个子分类，将一并删除。确定？`;
  else if (cnt)
    msg = `该分类下有 ${cnt} 个工具（工具保留，仅移出分类）。确定删除？`;
  else
    msg = '确定删除此分类？';

  if (!confirm(msg)) return;
  data.categories = data.categories.filter(c => !allIds.includes(c.id));
  if (allIds.includes(currentCat)) currentCat = 'all';
  save(); renderSidebar(); selectCat(currentCat);
}

// ── 弹窗控制 ──────────────────────────────────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

// ── 可拖拽分割线 ──────────────────────────────────────────────────────────────
(function initResizer() {
  const resizerEl = document.getElementById('resizer');
  const sidebarEl = document.getElementById('sidebar');
  const mainEl    = document.getElementById('mainArea');
  const MIN_W = 140, MAX_W = 480, RESIZER_PX = 5;

  function applyWidth(w) {
    w = Math.max(MIN_W, Math.min(MAX_W, w));
    sidebarEl.style.width       = w + 'px';
    resizerEl.style.left        = w + 'px';
    mainEl.style.marginLeft     = (w + RESIZER_PX) + 'px';
    document.documentElement.style.setProperty('--sidebar-w', w + 'px');
    try { localStorage.setItem('nav_sidebar_w', w); } catch(e) {}
  }

  // 恢复上次宽度
  try {
    const saved = parseInt(localStorage.getItem('nav_sidebar_w') || '');
    if (saved >= MIN_W && saved <= MAX_W) applyWidth(saved);
  } catch(e) {}

  let dragging = false, startX = 0, startW = 0;

  resizerEl.addEventListener('mousedown', e => {
    dragging = true;
    startX = e.clientX;
    startW = sidebarEl.getBoundingClientRect().width;
    resizerEl.classList.add('dragging');
    document.body.style.cursor     = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    applyWidth(startW + (e.clientX - startX));
  });
  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    resizerEl.classList.remove('dragging');
    document.body.style.cursor     = '';
    document.body.style.userSelect = '';
  });

  // 触摸支持
  resizerEl.addEventListener('touchstart', e => {
    dragging = true;
    startX = e.touches[0].clientX;
    startW = sidebarEl.getBoundingClientRect().width;
    resizerEl.classList.add('dragging');
    e.preventDefault();
  }, { passive: false });
  document.addEventListener('touchmove', e => {
    if (!dragging) return;
    applyWidth(startW + (e.touches[0].clientX - startX));
  }, { passive: true });
  document.addEventListener('touchend', () => {
    dragging = false; resizerEl.classList.remove('dragging');
  });
})();

// ── 初始化（先本地渲染，再异步拉取 GitHub 最新数据） ─────────────────────────
renderSidebar();
selectCat('all');
updateGhBtn();

(async function() {
  // rawLoad：用 raw.githubusercontent.com 公开读取，无需 Token，所有访客均可用
  // ghLoad：用 GitHub API 读取，需要 Token，保留 sha 供后续写入
  const hasRawConfig = (ghConfig.owner || RAW_OWNER) && (ghConfig.repo || RAW_REPO);
  if (hasRawConfig) {
    const remote = await rawLoad();
    if (remote) {
      data = remote;
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
      renderSidebar();
      selectCat(currentCat);
    }
    // 如果是管理员（有 token），额外调一次 ghLoad 拿到 sha，以便后续写入
    if (ghConfig.owner && ghConfig.repo && ghConfig.token) {
      const apiRes = await ghLoad();
      if (apiRes) {
        data = apiRes;
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
        renderSidebar();
        selectCat(currentCat);
      }
    }
  } else {
    showSyncStatus('warn', '💡 未配置 GitHub，当前使用本地浏览器存储（换浏览器数据不同步）');
  }
})();
</script>

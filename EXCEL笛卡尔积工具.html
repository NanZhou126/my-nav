<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Excel 笛卡尔积处理工具</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
    }
    .container {
      width: 100%; max-width: 900px; background: #fff; border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden;
      display: flex; flex-direction: column; height: 90vh; max-height: 800px;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; padding: 20px; text-align: center;
    }
    .header h1 { font-size: 1.5rem; margin-bottom: 5px; }
    .header p { opacity: 0.9; font-size: 0.9rem; }
    .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .upload-section { padding: 20px; border-bottom: 1px solid #eee; background: #f8f9fa; }
    .upload-area {
      border: 2px dashed #667eea; border-radius: 12px; padding: 30px;
      text-align: center; cursor: pointer; transition: all 0.3s ease; background: white;
    }
    .upload-area:hover { border-color: #764ba2; background: #f0f0ff; }
    .upload-area.dragover { border-color: #764ba2; background: #e8e8ff; }
    .upload-area.has-file { border-color: #28a745; background: #e8f5e9; }
    .upload-icon { font-size: 3rem; margin-bottom: 10px; }
    .file-input { display: none; }
    .chat-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 20px; background: #f5f5f5; }
    .message { margin-bottom: 15px; display: flex; align-items: flex-start; }
    .message.user { flex-direction: row-reverse; }
    .message-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0;
    }
    .message.bot .message-avatar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    .message.user .message-avatar { background: #28a745; color: white; }
    .message-content { max-width: 70%; padding: 12px 16px; border-radius: 12px; margin: 0 10px; line-height: 1.5; }
    .message.bot .message-content { background: white; border: 1px solid #e0e0e0; }
    .message.user .message-content { background: #667eea; color: white; }
    .input-section { padding: 15px 20px; background: white; border-top: 1px solid #eee; display: flex; gap: 10px; }
    .chat-input {
      flex: 1; padding: 12px 16px; border: 2px solid #e0e0e0;
      border-radius: 25px; font-size: 1rem; outline: none; transition: border-color 0.3s;
    }
    .chat-input:focus { border-color: #667eea; }
    .send-btn {
      padding: 12px 24px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; border: none; border-radius: 25px; cursor: pointer; font-size: 1rem;
    }
    .send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 15px rgba(102,126,234,0.4); }
    .send-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .download-btn {
      display: inline-block; margin-top: 10px; padding: 8px 16px;
      background: #28a745; color: white; border: none; border-radius: 20px; cursor: pointer;
    }
    .download-btn:hover { background: #218838; }
    .quick-commands { padding: 10px 20px; background: #fff; border-top: 1px solid #eee; display: flex; flex-wrap: wrap; gap: 8px; }
    .quick-cmd {
      padding: 6px 12px; background: #f0f0f0; border: 1px solid #ddd;
      border-radius: 15px; font-size: 0.8rem; cursor: pointer;
    }
    .quick-cmd:hover { background: #667eea; color: white; border-color: #667eea; }
    .data-table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 0.85rem; }
    .data-table th, .data-table td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    .data-table th { background: #667eea; color: white; }
    .data-table tr:nth-child(even) { background: #f9f9f9; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📊 Excel 笛卡尔积处理工具</h1>
      <p>上传 Excel 文件，通过对话完成笛卡尔积运算</p>
    </div>
    <div class="main-content">
      <div class="upload-section">
        <div class="upload-area" id="uploadArea">
          <div class="upload-icon">📁</div>
          <div>点击或拖拽上传 Excel 文件</div>
          <div style="font-size: 0.8rem; color: #888; margin-top: 5px;">支持 .xlsx, .xls 格式</div>
          <input type="file" class="file-input" id="fileInput" accept=".xlsx,.xls">
        </div>
      </div>
      <div class="chat-section">
        <div class="chat-messages" id="chatMessages">
          <div class="message bot">
            <div class="message-avatar">🤖</div>
            <div class="message-content">你好！我是 Excel 笛卡尔积助手。<br><br>请先上传 Excel 文件，然后告诉我哪些列需要做笛卡尔积。<br><br>例如：<em>"第1个sheet的A列和B列做笛卡尔积，结果存到结果页的A列"</em></div>
          </div>
        </div>
        <div class="quick-commands" id="quickCommands">
          <span class="quick-cmd" data-cmd="查看文件信息">📋 查看文件信息</span>
          <span class="quick-cmd" data-cmd="预览数据">👀 预览数据</span>
          <span class="quick-cmd" data-cmd="第1个sheet的A列和B列做笛卡尔积">🔢 A×B 笛卡尔积</span>
          <span class="quick-cmd" data-cmd="帮助">❓ 帮助</span>
        </div>
        <div class="input-section">
          <input type="text" class="chat-input" id="chatInput" placeholder="输入指令..." disabled>
          <button class="send-btn" id="sendBtn" disabled>发送</button>
        </div>
      </div>
    </div>
  </div>
<script>
var currentWorkbook = null, currentFileName = '', lastResult = null;
var uploadArea = document.getElementById('uploadArea');
var fileInput = document.getElementById('fileInput');
var chatMessages = document.getElementById('chatMessages');
var chatInput = document.getElementById('chatInput');
var sendBtn = document.getElementById('sendBtn');
var quickCommands = document.getElementById('quickCommands');

function indexToLetter(i) {
  var l = ''; while (i >= 0) { l = String.fromCharCode((i % 26) + 65) + l; i = Math.floor(i / 26) - 1; } return l;
}
function letterToIndex(l) {
  var i = 0; for (var j = 0; j < l.length; j++) i = i * 26 + (l.charCodeAt(j) - 64); return i - 1;
}
function getUniqueValues(data, col) {
  var v = [], s = {}; for (var i = 1; i < data.length; i++) {
    var x = data[i] && data[i][col]; if (x != null && x !== '' && !s[x]) { s[x] = 1; v.push(x); }
  } return v;
}
function cartesianProduct(arr) {
  if (!arr.length) return [[]]; var r = [[]];
  for (var i = 0; i < arr.length; i++) {
    var n = []; for (var j = 0; j < r.length; j++) for (var k = 0; k < arr[i].length; k++) n.push(r[j].concat([arr[i][k]]));
    r = n;
  } return r;
}
function addMessage(c, u) {
  var d = document.createElement('div'); d.className = 'message ' + (u ? 'user' : 'bot');
  d.innerHTML = '<div class="message-avatar">' + (u ? '👤' : '🤖') + '</div><div class="message-content">' + c + '</div>';
  chatMessages.appendChild(d); chatMessages.scrollTop = chatMessages.scrollHeight;
}
function createTable(h, rows, max) {
  max = max || 10; var t = '<table class="data-table"><thead><tr>';
  for (var i = 0; i < h.length; i++) t += '<th>' + h[i] + '</th>';
  t += '</tr></thead><tbody>';
  for (var i = 0; i < Math.min(rows.length, max); i++) {
    t += '<tr>'; for (var j = 0; j < rows[i].length; j++) t += '<td>' + (rows[i][j] != null ? rows[i][j] : '') + '</td>'; t += '</tr>';
  }
  t += '</tbody></table>'; if (rows.length > max) t += '<div style="color:#888;font-size:0.8rem">... 还有 ' + (rows.length - max) + ' 行</div>';
  return t;
}
function resolveSheet(r) {
  if (!currentWorkbook) return null;
  if (typeof r === 'number') { var i = r - 1; return (i >= 0 && i < currentWorkbook.SheetNames.length) ? currentWorkbook.SheetNames[i] : null; }
  if (currentWorkbook.SheetNames.indexOf(r) !== -1) return r;
  var m = String(r).match(/第(\d+)个?sheet/i); if (m) { var i = parseInt(m[1]) - 1; return (i >= 0 && i < currentWorkbook.SheetNames.length) ? currentWorkbook.SheetNames[i] : null; }
  return null;
}
function resolveColumn(h, r) {
  if (typeof r === 'number') { var i = r - 1; return (i >= 0 && i < h.length) ? {index: i, name: String(h[i] || '列'+r), letter: indexToLetter(i)} : null; }
  var s = String(r).trim(); if (/^[A-Z]+$/i.test(s)) { var i = letterToIndex(s.toUpperCase()); return (i >= 0 && i < h.length) ? {index: i, name: String(h[i] || s), letter: s.toUpperCase()} : null; }
  for (var i = 0; i < h.length; i++) if (String(h[i]).toLowerCase() === s.toLowerCase()) return {index: i, name: String(h[i]), letter: indexToLetter(i)};
  return null;
}
function getWorkbookInfo() {
  if (!currentWorkbook) return null; var sheets = [];
  for (var i = 0; i < currentWorkbook.SheetNames.length; i++) {
    var n = currentWorkbook.SheetNames[i], sh = currentWorkbook.Sheets[n], d = XLSX.utils.sheet_to_json(sh, {header: 1}), h = d[0] || [], cols = [];
    for (var j = 0; j < h.length; j++) cols.push({index: j+1, letter: indexToLetter(j), name: String(h[j] || '列'+(j+1)), samples: getUniqueValues(d, j).slice(0,3)});
    sheets.push({index: i+1, name: n, columns: cols, rowCount: Math.max(0, d.length-1)});
  }
  return {sheetCount: currentWorkbook.SheetNames.length, sheets: sheets};
}
function formatInfo(info) {
  var t = '<strong>📊 文件: ' + currentFileName + '</strong><br><br>';
  for (var i = 0; i < info.sheets.length; i++) {
    var s = info.sheets[i]; t += '<strong>📑 Sheet ' + s.index + ': "' + s.name + '"</strong> (' + s.rowCount + ' 行)<br><div style="margin-left:15px;margin-bottom:10px">';
    for (var j = 0; j < s.columns.length; j++) { var c = s.columns[j]; t += c.letter + '列: <em>' + c.name + '</em> - ' + (c.samples.join(', ') || '(空)') + '<br>'; }
    t += '</div>';
  } return t;
}
function parseCmd(cmd) {
  var r = {}, m = cmd.match(/第(\d+)个?sheet/i); if (m) r.sourceSheet = parseInt(m[1]);
  var cols = [], cm = cmd.match(/([A-Z])列/gi); if (cm) for (var i = 0; i < cm.length; i++) { var c = cm[i].replace(/列/g, '').toUpperCase(); if (cols.indexOf(c) === -1) cols.push(c); }
  if (cols.length) r.sourceColumns = cols;
  var tm = cmd.match(/存到([^\s的]+?)的/); if (tm) r.targetSheet = tm[1];
  var tc = cmd.match(/的([A-Z])列(?:开始)?$/i); if (tc) r.targetStartColumn = tc[1].toUpperCase();
  return Object.keys(r).length ? r : null;
}
function processCartesian(opts) {
  var srcName = resolveSheet(opts.sourceSheet); if (!srcName) throw new Error('找不到 Sheet: ' + opts.sourceSheet);
  var srcData = XLSX.utils.sheet_to_json(currentWorkbook.Sheets[srcName], {header: 1}), h = srcData[0] || [];
  if (!h.length) throw new Error('源 Sheet 没有数据');
  var cols = []; for (var i = 0; i < opts.sourceColumns.length; i++) { var c = resolveColumn(h, opts.sourceColumns[i]); if (!c) throw new Error('找不到列: ' + opts.sourceColumns[i]); cols.push(c); }
  var vals = []; for (var i = 0; i < cols.length; i++) { var v = getUniqueValues(srcData, cols[i].index); if (!v.length) throw new Error('列 ' + cols[i].letter + ' 没有数据'); vals.push(v); }
  var combos = cartesianProduct(vals), headers = []; for (var i = 0; i < cols.length; i++) headers.push(cols[i].name);
  var tci = 0, tsc = opts.targetStartColumn || 'A'; if (typeof tsc === 'number') tci = tsc - 1; else if (/^[A-Z]+$/i.test(tsc)) tci = letterToIndex(tsc.toUpperCase());
  var newWb = XLSX.utils.book_new(); for (var i = 0; i < currentWorkbook.SheetNames.length; i++) { var n = currentWorkbook.SheetNames[i]; newWb.Sheets[n] = JSON.parse(JSON.stringify(currentWorkbook.Sheets[n])); newWb.SheetNames.push(n); }
  var tgtName = opts.targetSheet || '笛卡尔积结果', tgt; if (newWb.SheetNames.indexOf(tgtName) !== -1) tgt = newWb.Sheets[tgtName]; else { tgt = {}; XLSX.utils.book_append_sheet(newWb, tgt, tgtName); }
  for (var i = 0; i < headers.length; i++) tgt[indexToLetter(tci + i) + '1'] = {t: 's', v: headers[i]};
  for (var i = 0; i < combos.length; i++) for (var j = 0; j < combos[i].length; j++) tgt[indexToLetter(tci + j) + (i + 2)] = {t: typeof combos[i][j] === 'number' ? 'n' : 's', v: combos[i][j]};
  var endCol = indexToLetter(tci + headers.length - 1); tgt['!ref'] = 'A1:' + endCol + (combos.length + 1);
  lastResult = {workbook: newWb, combinations: combos, headers: headers, location: {sheet: tgtName, startCol: indexToLetter(tci), endCol: endCol, rowCount: combos.length}};
  return lastResult;
}
function downloadResult() {
  if (!lastResult) { addMessage('❌ 没有可下载的结果'); return; }
  var out = XLSX.write(lastResult.workbook, {bookType: 'xlsx', type: 'array'});
  var blob = new Blob([out], {type: 'application/octet-stream'}), link = document.createElement('a');
  link.href = URL.createObjectURL(blob); link.download = currentFileName.replace(/\.xlsx?$/i, '') + '_笛卡尔积结果.xlsx'; link.click(); URL.revokeObjectURL(link.href);
}
function handleCommand(cmd) {
  var c = cmd.trim().toLowerCase();
  if (c === '帮助' || c === 'help') { addMessage('<strong>📖 使用帮助</strong><br><br>1. 查看文件信息 - 输入 "查看文件信息"<br>2. 预览数据 - 输入 "预览数据"<br>3. 笛卡尔积 - "第1个sheet的A列和B列做笛卡尔积，结果存到结果页的A列"<br>4. 下载 - 输入 "下载"'); return; }
  if (c.indexOf('文件信息') !== -1) { var info = getWorkbookInfo(); addMessage(info ? formatInfo(info) : '❌ 请先上传文件'); return; }
  if (c.indexOf('预览') !== -1) { var m = c.match(/预览\s*(?:sheet)?(\d+)?/i), idx = m && m[1] ? parseInt(m[1]) : 1, name = resolveSheet(idx); if (!name) { addMessage('❌ 找不到 Sheet ' + idx); return; } var d = XLSX.utils.sheet_to_json(currentWorkbook.Sheets[name], {header: 1}); addMessage('<strong>📋 ' + name + ' 预览</strong><br>' + createTable(d[0] || [], d.slice(1), 8)); return; }
  if (c === '下载') { downloadResult(); addMessage('✅ 下载已开始'); return; }
  if (c.indexOf('笛卡尔积') !== -1 || (c.indexOf('列') !== -1 && c.indexOf('做') !== -1)) {
    var p = parseCmd(cmd); if (!p || !p.sourceColumns || p.sourceColumns.length < 2) { addMessage('❌ 请使用格式: "第1个sheet的A列和B列做笛卡尔积，结果存到结果页的A列"'); return; }
    try { var r = processCartesian({sourceSheet: p.sourceSheet || 1, sourceColumns: p.sourceColumns, targetSheet: p.targetSheet || '笛卡尔积结果', targetStartColumn: p.targetStartColumn || 'A'});
      addMessage('<strong>✅ 完成!</strong><br><br>📍 位置: ' + r.location.sheet + '<br>📊 列: ' + r.location.startCol + ' - ' + r.location.endCol + '<br>🔢 组合数: ' + r.location.rowCount + '<br><br><strong>预览:</strong><br>' + createTable(r.headers, r.combinations, 10) + '<br><button class="download-btn" onclick="downloadResult()">📥 下载结果</button>');
    } catch (e) { addMessage('❌ 错误: ' + e.message); } return;
  }
  addMessage('🤔 不理解指令，试试 "帮助" 查看用法');
}
uploadArea.addEventListener('click', function() { fileInput.click(); });
uploadArea.addEventListener('dragover', function(e) { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', function() { uploadArea.classList.remove('dragover'); });
uploadArea.addEventListener('drop', function(e) { e.preventDefault(); uploadArea.classList.remove('dragover'); if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', function(e) { if (e.target.files.length) handleFile(e.target.files[0]); });
function handleFile(file) {
  if (!file.name.match(/\.xlsx?$/i)) { addMessage('❌ 请上传 Excel 文件'); return; }
  currentFileName = file.name; var reader = new FileReader();
  reader.onload = function(e) { try { currentWorkbook = XLSX.read(e.target.result, {type: 'array'}); uploadArea.classList.add('has-file'); uploadArea.innerHTML = '<div class="upload-icon">✅</div><div>' + currentFileName + '</div><div style="font-size:0.8rem;color:#666;margin-top:5px">点击重新上传</div>'; chatInput.disabled = false; sendBtn.disabled = false; chatInput.focus(); var info = getWorkbookInfo(); addMessage('✅ 上传成功!<br><br>' + formatInfo(info) + '<br>💡 输入指令开始处理'); } catch (err) { addMessage('❌ 解析失败: ' + err.message); } };
  reader.readAsArrayBuffer(file);
}
function sendMessage() { var msg = chatInput.value.trim(); if (!msg) return; addMessage(msg, true); chatInput.value = ''; setTimeout(function() { handleCommand(msg); }, 300); }
sendBtn.addEventListener('click', sendMessage);
chatInput.addEventListener('keypress', function(e) { if (e.key === 'Enter') sendMessage(); });
quickCommands.addEventListener('click', function(e) { if (e.target.classList.contains('quick-cmd')) { var cmd = e.target.getAttribute('data-cmd'); if (!currentWorkbook && cmd !== '帮助') { addMessage('❌ 请先上传文件'); return; } chatInput.value = cmd; sendMessage(); } });
</script>
</body>
</html>

    confirmHeaderEditWith(oldCol, input.value.trim());
}

function startHeaderEdit(col) { editingHeader = col; renderPreviewHeader(); setTimeout(() => { const inp = document.getElementById('headerEditInput'); if (inp) inp.focus(); }, 30); }
function cancelHeaderEdit() { editingHeader = null; renderPreviewHeader(); }
function onHeaderEditKey(e, oldCol) {
    if (e.key === 'Enter') { e.preventDefault(); confirmHeaderEditWith(oldCol, document.getElementById('headerEditInput')?.value.trim()); }
    if (e.key === 'Escape') { e.preventDefault(); cancelHeaderEdit(); }
}
function confirmHeaderEdit(oldCol) {
    const input = document.getElementById('headerEditInput');
    if (!input) return;
    confirmHeaderEditWith(oldCol, input.value.trim());
}
function confirmHeaderEditWith(oldCol, newCol) {
    if (!newCol) { alert('列名不能为空'); return; }
    if (newCol === oldCol) { editingHeader = null; renderPreviewHeader(); return; }
    const willMerge = previewCols.includes(newCol);
    if (willMerge) {
        const conflicts = checkCellConflicts(oldCol, newCol);
        if (conflicts.length > 0) {
            let conflictHtml = '<div class="conflict-preview"><table><tr><th>行号</th><th>来源</th><th>原值</th><th>目标列已有值</th></tr>';
            conflicts.slice(0, 10).forEach(c => {
                conflictHtml += `<tr><td>${c.rowIndex}</td><td>${escapeHtml(c.sourceFile)}</td><td>${escapeHtml(c.oldValue)}</td><td>${escapeHtml(c.targetValue)}</td></tr>`;
            });
            if (conflicts.length > 10) conflictHtml += `<tr><td colspan="4">... 还有 ${conflicts.length - 10} 条冲突</td></tr>`;
            conflictHtml += '</table></div>';
            showConflictDialog(oldCol, newCol, conflicts.length, conflictHtml);
            return;
        }
    }
    showRenameDialog(oldCol, newCol, willMerge);
}

// ==================== 行排序 ====================
function toggleRowSort(el) {
    const col = el.getAttribute('data-col');
    if (sortCol === col) {
        if (sortDir === 'asc') sortDir = 'desc';
        else { sortCol = null; sortDir = 'asc'; } // 第三次点击取消排序
    } else {
        sortCol = col;
        sortDir = 'asc';
    }
    currentPage = 1;
    renderPreviewHeader();
    renderPreviewBody();
    renderPagination();
}

function checkCellConflicts(oldCol, newCol) {
    const conflicts = [];
    mergedData.forEach((row, index) => {
        const oldVal = row[oldCol] !== undefined ? String(row[oldCol]).trim() : '';
        const newVal = row[newCol] !== undefined ? String(row[newCol]).trim() : '';
        
        if (newVal !== '' && oldVal !== '' && oldVal !== newVal) {
            conflicts.push({
                rowIndex: index + 1,
                sourceFile: row.__source__,
                oldValue: oldVal,
                targetValue: newVal
            });
        }
    });
    return conflicts;
}

function showConflictDialog(oldCol, newCol, conflictCount, conflictHtml) {
    const overlay = document.createElement('div'); overlay.className = 'confirm-overlay';
    overlay.innerHTML = `<div class="confirm-dialog">
        <h3 style="color:#ff6b9d;">⚠️ 数据冲突警告</h3>
        <div class="alert-danger">
            发现 <strong>${conflictCount}</strong> 处数据冲突！<br>
            将列 <strong>"${escapeHtml(oldCol)}"</strong> 合并到 <strong>"${escapeHtml(newCol)}"</strong> 时，以下单元格已有值且不相同：
        </div>
        ${conflictHtml}
        <p style="color:#888;margin-top:10px;">根据规则，只有当目标单元格为空时才允许合并。请修改列名或处理冲突后重试。</p>
        <div class="dialog-btns">
            <button class="d-cancel" id="dialogCancel">关闭</button>
        </div>
    </div>`;
    document.body.appendChild(overlay);
    document.getElementById('dialogCancel').onclick = () => overlay.remove();
}

function showRenameDialog(oldCol, newCol, willMerge) {
    const overlay = document.createElement('div'); overlay.className = 'confirm-overlay';
    let warnHtml = willMerge ? `<div class="merge-warning">⚠️ 已存在名为 <strong>"${escapeHtml(newCol)}"</strong> 的列，确认后两列数据将会合并（仅当目标单元格为空时填充）。</div>` : '';
    overlay.innerHTML = `<div class="confirm-dialog"><h3 style="color:#00bbf9;">✏️ 确认修改列名</h3><p><strong>${escapeHtml(oldCol)}</strong> → <strong>${escapeHtml(newCol)}</strong></p>${warnHtml}<p style="color:#888;">此操作将更新合并数据。</p><div class="dialog-btns"><button class="d-cancel" id="dialogCancel">取消</button><button class="d-confirm" id="dialogConfirm">${willMerge ? '确认合并' : '确认修改'}</button></div></div>`;
    document.body.appendChild(overlay);
    document.getElementById('dialogCancel').onclick = () => overlay.remove();
    document.getElementById('dialogConfirm').onclick = () => { overlay.remove(); applyHeaderRename(oldCol, newCol, willMerge); };
}

function applyHeaderRename(oldCol, newCol, willMerge) {
    editingHeader = null;
    saveSnapshot(willMerge ? `合并列 "${oldCol}" → "${newCol}"` : `重命名列 "${oldCol}" → "${newCol}"`);
    if (willMerge) {
        mergedData.forEach(row => {
            const oldVal = row[oldCol] !== undefined ? String(row[oldCol]).trim() : '';
            const newVal = row[newCol] !== undefined ? String(row[newCol]).trim() : '';
            
            if (newVal === '' && oldVal !== '') {
                row[newCol] = oldVal;
            }
            delete row[oldCol];
        });
        
        previewCols = previewCols.filter(c => c !== oldCol);
    } else {
        mergedData.forEach(row => {
            row[newCol] = row[oldCol];
            delete row[oldCol];
        });
        previewCols = previewCols.map(c => c === oldCol ? newCol : c);
    }
    
    if (activeFilters[oldCol]) {
        if (!willMerge || !activeFilters[newCol]) activeFilters[newCol] = activeFilters[oldCol];
        delete activeFilters[oldCol];
    }
    
    // 注意：这里不修改 cellMappings，因为单元格级映射是独立的
    
    buildColSourceMap(previewCols);
    openSourcePopover = null; currentPage = 1;
    updateRegexColumnSelect();
    renderPreview();
}

function requestDeleteColumn(col) {
    const overlay = document.createElement('div'); overlay.className = 'confirm-overlay';
    overlay.innerHTML = `<div class="confirm-dialog"><h3 style="color:#ff6b9d;">🗑️ 确认删除列</h3><div class="delete-warning">确定要删除列 <strong>"${escapeHtml(col)}"</strong> 吗？<br>删除后该列将不参与数据合并和导出。</div><div class="dialog-btns"><button class="d-cancel" id="dialogCancel">取消</button><button class="d-danger" id="dialogConfirm">确认删除</button></div></div>`;
    document.body.appendChild(overlay);
    document.getElementById('dialogCancel').onclick = () => overlay.remove();
    document.getElementById('dialogConfirm').onclick = () => { overlay.remove(); applyDeleteColumn(col); };
}
function applyDeleteColumn(col) {
    saveSnapshot(`删除列 "${col}"`);
    previewCols = previewCols.filter(c => c !== col);
    mergedData.forEach(row => { delete row[col]; });
    delete activeFilters[col];
    buildColSourceMap(previewCols);
    openSourcePopover = null; editingHeader = null; currentPage = 1;
    updateRegexColumnSelect();
    renderPreview();
}
function toggleSourcePopover(e, col) {

}

// ==================== 撤销/重做 ====================
function saveSnapshot(desc) {
    undoStack.push({
        desc,
        mergedData: JSON.parse(JSON.stringify(mergedData)),
        previewCols: [...previewCols]
    });
    if (undoStack.length > MAX_UNDO) undoStack.shift();
    redoStack = [];
    updateUndoRedoUI();
}

function updateUndoRedoUI() {
    const undoBtn = document.getElementById('undoBtn');
    const redoBtn = document.getElementById('redoBtn');
    const label = document.getElementById('undoLabel');
    if (!undoBtn) return;
    undoBtn.disabled = undoStack.length === 0;
    redoBtn.disabled = redoStack.length === 0;
    if (undoStack.length > 0) {
        label.textContent = `可撤销: ${undoStack[undoStack.length-1].desc}`;
    } else {
        label.textContent = '';
    }
}

function undoAction() {
    if (!undoStack.length) return;
    redoStack.push({ desc: '重做', mergedData: JSON.parse(JSON.stringify(mergedData)), previewCols: [...previewCols] });
    const snap = undoStack.pop();
    mergedData = snap.mergedData;
    previewCols = snap.previewCols;
    buildColSourceMap(previewCols);
    currentPage = 1;
    updateRegexColumnSelect();
    updateDedupColSelect();
    renderPreview();
    updateUndoRedoUI();
    showToast(`↩ 已撤销: ${snap.desc}`);
}

function redoAction() {
    if (!redoStack.length) return;
    undoStack.push({ desc: '撤销', mergedData: JSON.parse(JSON.stringify(mergedData)), previewCols: [...previewCols] });
    const snap = redoStack.pop();
    mergedData = snap.mergedData;
    previewCols = snap.previewCols;
    buildColSourceMap(previewCols);
    currentPage = 1;
    updateRegexColumnSelect();
    updateDedupColSelect();
    renderPreview();
    updateUndoRedoUI();
    showToast('↪ 已重做');
}

function showToast(msg) {
    let t = document.getElementById('toastMsg');
    if (!t) {
        t = document.createElement('div');
        t.id = 'toastMsg';
        t.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#3b2e6b;color:white;padding:12px 28px;border-radius:50px;font-weight:700;font-size:1rem;z-index:9999;box-shadow:0 6px 20px rgba(0,0,0,0.25);transition:opacity 0.4s;pointer-events:none;';
        document.body.appendChild(t);
    }
    t.textContent = msg;
    t.style.opacity = '1';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.style.opacity = '0'; }, 2000);
}

// ==================== 列拖拽排序 ====================
function onColDragStart(e, idx) {
    dragSrcColIdx = idx;
    e.dataTransfer.effectAllowed = 'move';
    e.currentTarget.classList.add('dragging');
}
function onColDragOver(e, idx) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const th = e.currentTarget;
    document.querySelectorAll('#previewHead th.header-cell').forEach(el => {
        el.classList.remove('drag-over-left', 'drag-over-right');
    });
    if (idx !== dragSrcColIdx) {
        const rect = th.getBoundingClientRect();
        if (e.clientX < rect.left + rect.width / 2) th.classList.add('drag-over-left');
        else th.classList.add('drag-over-right');
    }
}
function onColDragLeave(e) {
    e.currentTarget.classList.remove('drag-over-left', 'drag-over-right');
}
function onColDrop(e, targetIdx) {
    e.preventDefault();
    document.querySelectorAll('#previewHead th.header-cell').forEach(el => {
        el.classList.remove('drag-over-left', 'drag-over-right', 'dragging');
    });
    if (dragSrcColIdx === null || dragSrcColIdx === targetIdx) return;
    saveSnapshot(`移动列 "${previewCols[dragSrcColIdx]}"`);
    const th = e.currentTarget;
    const rect = th.getBoundingClientRect();
    let insertAt = targetIdx;
    if (e.clientX >= rect.left + rect.width / 2) insertAt = targetIdx + 1;
    if (insertAt > dragSrcColIdx) insertAt--;
    const col = previewCols.splice(dragSrcColIdx, 1)[0];
    previewCols.splice(insertAt, 0, col);
    dragSrcColIdx = null;
    renderPreviewHeader();
    renderPreviewBody();
}
function onColDragEnd(e) {
    dragSrcColIdx = null;
    document.querySelectorAll('#previewHead th.header-cell').forEach(el => {
        el.classList.remove('drag-over-left', 'drag-over-right', 'dragging');
    });
}

// ==================== 去重功能 ====================
function updateDedupColSelect() {
    const sel = document.getElementById('dedupColSelect');
    if (!sel) return;
    sel.innerHTML = previewCols.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
}

function applyDedup() {
    const sel = document.getElementById('dedupColSelect');
    const mode = document.getElementById('dedupModeSelect').value;
    const keyCols = [...sel.selectedOptions].map(o => o.value);
    if (!keyCols.length) { showToast('⚠️ 请先选择去重依据列'); return; }

    const before = mergedData.length;
    saveSnapshot(`去重 (按: ${keyCols.join(', ')})`);

    const seen = new Map();
    if (mode === 'first') {
        mergedData = mergedData.filter(row => {
            const key = keyCols.map(c => String(row[c] ?? '')).join('\x00');
            if (seen.has(key)) return false;
            seen.set(key, true); return true;
        });
    } else {
        const reversed = [...mergedData].reverse().filter(row => {
            const key = keyCols.map(c => String(row[c] ?? '')).join('\x00');
            if (seen.has(key)) return false;
            seen.set(key, true); return true;
        });
        mergedData = reversed.reverse();
    }

    const removed = before - mergedData.length;
    currentPage = 1;
    renderPreview();
    showToast(`🧹 去重完成，删除 ${removed} 条重复行，剩余 ${mergedData.length} 条`);
}

// ==================== 数据统计面板 ====================
function toggleColStats(col) {
    openColStats = openColStats === col ? null : col;
    renderPreviewHeader();
}

function buildColStatsHtml(col) {
    // 使用当前筛选后数据（而非全量）
    const data = getFilteredData();
    const total = data.length;
    if (total === 0) return `<div class="col-stats-panel"><div class="col-stats-title">📊 ${escapeHtml(col)}</div><div style="color:#aaa">暂无数据</div></div>`;

    const vals = data.map(r => String(r[col] ?? '').trim());
    const empty = vals.filter(v => v === '').length;
    const nonEmpty = total - empty;
    const emptyRate = ((empty / total) * 100).toFixed(1);
    const fillRate = ((nonEmpty / total) * 100).toFixed(1);

    const freq = {};
    vals.forEach(v => { if (v !== '') freq[v] = (freq[v] || 0) + 1; });
    const uniqueCount = Object.keys(freq).length;
    const top5 = Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, 5);

    // 数值列判断
    const numVals = vals.filter(v => v !== '' && !isNaN(parseFloat(v))).map(v => parseFloat(v));
    const isNumeric = numVals.length > 0 && numVals.length / nonEmpty > 0.8;

    let html = `<div class="col-stats-panel" onclick="event.stopPropagation()">`;
    html += `<div class="col-stats-title">📊 ${escapeHtml(col)}</div>`;
    html += `<div style="font-size:0.75rem;color:#aaa;margin-bottom:6px;font-style:italic;">基于当前筛选结果 (${total.toLocaleString()} 行)</div>`;
    html += `<div class="col-stats-row"><span>非空值</span><span class="col-stats-val">${nonEmpty.toLocaleString()}</span></div>`;
    html += `<div class="col-stats-row"><span>填充率</span><span class="col-stats-val">${fillRate}%</span></div>`;
    html += `<div class="col-stats-bar-bg"><div class="col-stats-bar-fill" style="width:${fillRate}%"></div></div>`;
    html += `<div class="col-stats-row"><span>空值</span><span class="col-stats-val">${empty.toLocaleString()} (${emptyRate}%)</span></div>`;
    html += `<div class="col-stats-row"><span>唯一值数</span><span class="col-stats-val">${uniqueCount.toLocaleString()}</span></div>`;

    if (isNumeric) {
        const sum = numVals.reduce((a, b) => a + b, 0);
        const avg = sum / numVals.length;
        const min = Math.min(...numVals);
        const max = Math.max(...numVals);
        const sorted = [...numVals].sort((a, b) => a - b);
        const median = sorted.length % 2 === 0
            ? (sorted[sorted.length/2-1] + sorted[sorted.length/2]) / 2
            : sorted[Math.floor(sorted.length/2)];
        const fmt = n => Number.isInteger(n) ? n.toLocaleString() : n.toFixed(2);
        html += `<div class="col-stats-top" style="border-top:2px solid #f0e6ff;margin-top:8px;padding-top:8px;">`;
        html += `<div class="col-stats-top-title">🔢 数值统计</div>`;
        html += `<div class="col-stats-row"><span>最小值</span><span class="col-stats-val">${fmt(min)}</span></div>`;
        html += `<div class="col-stats-row"><span>最大值</span><span class="col-stats-val">${fmt(max)}</span></div>`;
        html += `<div class="col-stats-row"><span>平均值</span><span class="col-stats-val">${fmt(avg)}</span></div>`;
        html += `<div class="col-stats-row"><span>中位数</span><span class="col-stats-val">${fmt(median)}</span></div>`;
        html += `<div class="col-stats-row"><span>总和</span><span class="col-stats-val">${fmt(sum)}</span></div>`;
        html += `</div>`;
    }

    if (top5.length && !isNumeric) {
        html += `<div class="col-stats-top"><div class="col-stats-top-title">🏆 TOP ${top5.length} 频率值</div>`;
        top5.forEach(([v, cnt]) => {
            const pct = ((cnt/total)*100).toFixed(1);
            html += `<div class="col-stats-top-item"><span title="${escapeHtml(v)}">${escapeHtml(v.substring(0,20))}${v.length>20?'…':''}</span><span style="color:#ff6b9d;font-weight:700">${cnt} (${pct}%)</span></div>`;
        });
        html += `</div>`;
    }
    html += `</div>`;
    return html;
}

// ==================== 导出行数提示 ====================
function updateExportHint() {
    const hint = document.getElementById('exportHint');
    if (!hint) return;
    const filtered = getFilteredData();
    const total = mergedData.length;
    if (filtered.length === total) {
        hint.textContent = `导出 ${total.toLocaleString()} 行`;
        hint.style.background = '#f0e6ff';
        hint.style.borderColor = '#9b5de5';
        hint.style.color = '#9b5de5';
    } else {
        hint.textContent = `导出筛选后 ${filtered.length.toLocaleString()} / ${total.toLocaleString()} 行`;
        hint.style.background = '#fff0f5';
        hint.style.borderColor = '#ff6b9d';
        hint.style.color = '#ff6b9d';
    }
}

// ==================== 下载 ====================
function downloadFile(fmt) {
    const includeSource = document.getElementById('includeSourceCol')?.checked ?? false;
    const splitBySource = document.getElementById('splitBySource')?.checked ?? false;
    const filteredData = getFilteredData();

    if (filteredData.length === 0) { showToast('⚠️ 当前无数据可导出'); return; }

    const exportCols = [...previewCols];
    if (includeSource) exportCols.push('数据源');

    const wb = XLSX.utils.book_new();

    if (splitBySource && fmt === 'xlsx') {
        // 按来源文件分 Sheet
        const groups = {};
        filteredData.forEach(r => {
            const src = r.__source__ ?? '未知来源';
            if (!groups[src]) groups[src] = [];
            groups[src].push(r);
        });
        Object.entries(groups).forEach(([src, rows]) => {
            const exp = rows.map(r => {
                const n = {};
                previewCols.forEach(c => { n[c] = r[c] ?? ''; });
                if (includeSource) n['数据源'] = r.__source__ ?? '';
                return n;
            });
            // Sheet 名最长 31 字符（Excel 限制）
            let sheetName = src.replace(/[\[\]:*?\/\\]/g, '_').slice(0, 31);
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(exp, { header: exportCols }), sheetName);
        });
        showToast(`📑 已按 ${Object.keys(groups).length} 个来源分 Sheet 导出`);
    } else {
        const exp = filteredData.map(r => {
            const n = {};
            previewCols.forEach(c => { n[c] = r[c] ?? ''; });
            if (includeSource) n['数据源'] = r.__source__ ?? '';
            return n;
        });
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(exp, { header: exportCols }), '合并数据');
    }

    if (fmt === 'csv') {
        // CSV 只支持单 Sheet，始终导出全部筛选行
        const exp = filteredData.map(r => {
            const n = {};
            previewCols.forEach(c => { n[c] = r[c] ?? ''; });
            if (includeSource) n['数据源'] = r.__source__ ?? '';
            return n;
        });
        const wbCsv = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wbCsv, XLSX.utils.json_to_sheet(exp, { header: exportCols }), '合并数据');
        XLSX.writeFile(wbCsv, `merged_${new Date().toISOString().slice(0,10)}.csv`);
        if (splitBySource) showToast('💡 CSV 不支持分 Sheet，已导出为单文件');
    } else {
        XLSX.writeFile(wb, `merged_${new Date().toISOString().slice(0,10)}.xlsx`);
    }
}

function clearAll() {
    uploadedFiles = []; parsedData = []; columnMappings = {}; mergedData = [];
    headerRowNumbers = {}; activeFilters = {}; previewCols = []; colSourceMap = {};
    deletedCells = {};
    cellMappings = {};
    regexFilter = null; editingHeader = null; openSourcePopover = null; openFilterDropdown = null;
    openColStats = null;
    sortCol = null; sortDir = 'asc';
    undoStack = []; redoStack = [];
    currentPage = 1; pageSize = 100;
    fileList.innerHTML = ''; mappingSection.classList.add('hidden'); previewSection.classList.add('hidden'); fileInput.value = '';
    document.getElementById('paginationBar').innerHTML = '';
    updateUndoRedoUI();
}

function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escapeJs(s) { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

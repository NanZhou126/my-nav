<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>写作润色工具</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f7f4ef;
  --surface: #fffefb;
  --surface2: #f0ece4;
  --border: #ddd8cc;
  --border2: #c8c2b5;
  --text: #1c1a17;
  --text2: #6b6459;
  --text3: #a09890;
  --accent: #3d5a80;
  --accent-light: #e8eef5;
  --accent2: #98c1d9;
  --mode-active: #3d5a80;
  --mode-text: #fff;
}

body {
  font-family: 'Noto Serif SC', serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 13px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}

.logo { display: flex; align-items: center; gap: 10px; }

.logo-icon {
  width: 32px; height: 32px;
  background: var(--accent);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
}

.logo-icon svg { width: 17px; height: 17px; fill: none; stroke: #fff; stroke-width: 2; }
.logo-text { font-size: 16px; font-weight: 600; letter-spacing: 0.03em; }

.header-tip {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text3);
}

/* Mode tabs */
.mode-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  gap: 2px;
  flex-shrink: 0;
}

.mode-tab {
  padding: 10px 18px;
  font-family: 'Noto Serif SC', serif;
  font-size: 13px;
  color: var(--text2);
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.mode-tab:hover { color: var(--accent); }

.mode-tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  font-weight: 600;
}

.mode-tab .tag {
  display: inline-block;
  font-size: 10px;
  font-family: 'DM Mono', monospace;
  background: var(--accent-light);
  color: var(--accent);
  border-radius: 3px;
  padding: 1px 5px;
  margin-left: 5px;
  vertical-align: middle;
}

/* Main */
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* Panels */
.panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-left { border-right: 1px solid var(--border); }

.panel-header {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
  flex-shrink: 0;
}

.panel-label {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.word-count {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text3);
}

textarea {
  flex: 1;
  width: 100%;
  border: none;
  outline: none;
  resize: none;
  padding: 20px 22px;
  font-family: 'Noto Serif SC', serif;
  font-size: 15px;
  line-height: 1.9;
  color: var(--text);
  background: var(--surface);
  overflow-y: auto;
}

textarea::placeholder { color: var(--text3); }

/* Output area */
.output-body {
  flex: 1;
  padding: 20px 22px;
  font-size: 15px;
  line-height: 1.9;
  color: var(--text);
  background: var(--bg);
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-word;
}

.output-placeholder {
  color: var(--text3);
  font-style: italic;
}

.output-body.loading {
  display: flex;
  align-items: flex-start;
  gap: 6px;
  padding-top: 22px;
}

.dot {
  width: 7px; height: 7px;
  background: var(--text3);
  border-radius: 50%;
  animation: pulse 1.2s infinite;
  flex-shrink: 0;
  margin-top: 8px;
}

.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes pulse {
  0%, 80%, 100% { opacity: 0.25; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}

/* Bottom bars */
.panel-footer {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.btn-run {
  flex: 1;
  padding: 9px 20px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 7px;
  font-family: 'Noto Serif SC', serif;
  font-size: 14px;
  cursor: pointer;
  transition: opacity 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.btn-run:hover { opacity: 0.87; }
.btn-run:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-run svg { width: 15px; height: 15px; fill: none; stroke: #fff; stroke-width: 2.2; }

.btn-secondary {
  padding: 9px 14px;
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--border);
  border-radius: 7px;
  font-family: 'Noto Serif SC', serif;
  font-size: 13px;
  cursor: pointer;
  transition: background 0.15s;
  white-space: nowrap;
}

.btn-secondary:hover { background: var(--surface2); }

.output-footer {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  background: var(--bg);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.btn-copy {
  padding: 8px 16px;
  background: transparent;
  color: var(--accent);
  border: 1px solid var(--accent-light);
  border-radius: 7px;
  font-family: 'Noto Serif SC', serif;
  font-size: 13px;
  cursor: pointer;
  transition: background 0.15s;
}

.btn-copy:hover { background: var(--accent-light); }

.btn-use {
  padding: 8px 16px;
  background: var(--accent-light);
  color: var(--accent);
  border: 1px solid #c5d5e8;
  border-radius: 7px;
  font-family: 'Noto Serif SC', serif;
  font-size: 13px;
  cursor: pointer;
  transition: background 0.15s;
}

.btn-use:hover { background: #d5e4f0; }

.output-meta {
  margin-left: auto;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text3);
}

/* Style selector */
.style-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.style-label {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text3);
  white-space: nowrap;
}

.style-chip {
  font-size: 12px;
  font-family: 'Noto Serif SC', serif;
  color: var(--text2);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 12px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.style-chip:hover { border-color: var(--accent); color: var(--accent); }
.style-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Toast */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: #2a2825;
  color: #fff;
  font-size: 13px;
  padding: 8px 18px;
  border-radius: 20px;
  opacity: 0;
  transition: all 0.25s;
  pointer-events: none;
  font-family: 'Noto Serif SC', serif;
  white-space: nowrap;
}

.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Error */
.error-box {
  color: #903030;
  background: #fdf0f0;
  border: 1px solid #f0c8c8;
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 13px;
  line-height: 1.6;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    </div>
    <span class="logo-text">写作润色</span>
  </div>
  <span class="header-tip">由 DeepSeek 驱动</span>
</header>

<!-- Mode tabs -->
<div class="mode-bar">
  <button class="mode-tab active" onclick="setMode('polish', this)">润色改写</button>
  <button class="mode-tab" onclick="setMode('expand', this)">扩写 <span class="tag">加料</span></button>
  <button class="mode-tab" onclick="setMode('shorten', this)">缩写 <span class="tag">提炼</span></button>
  <button class="mode-tab" onclick="setMode('formal', this)">正式化</button>
  <button class="mode-tab" onclick="setMode('casual', this)">口语化</button>
  <button class="mode-tab" onclick="setMode('proofread', this)">校对纠错</button>
</div>

<!-- Style chips (only for polish/expand) -->
<div class="style-row" id="styleRow">
  <span class="style-label">写作风格：</span>
  <span class="style-chip active" onclick="setStyle(this)" data-val="通用">通用</span>
  <span class="style-chip" onclick="setStyle(this)" data-val="商务">商务</span>
  <span class="style-chip" onclick="setStyle(this)" data-val="学术">学术</span>
  <span class="style-chip" onclick="setStyle(this)" data-val="文学">文学</span>
  <span class="style-chip" onclick="setStyle(this)" data-val="新闻">新闻</span>
  <span class="style-chip" onclick="setStyle(this)" data-val="营销">营销</span>
</div>

<div class="main">
  <!-- Input -->
  <div class="panel panel-left">
    <div class="panel-header">
      <span class="panel-label">原文</span>
      <span class="word-count" id="inputCount">0 字</span>
    </div>
    <textarea id="inputText" placeholder="在此输入或粘贴需要润色的文字…"></textarea>
    <div class="panel-footer">
      <button class="btn-run" id="runBtn" onclick="runPolish()">
        <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        开始处理
      </button>
      <button class="btn-secondary" onclick="clearAll()">清空</button>
    </div>
  </div>

  <!-- Output -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-label">结果</span>
      <span class="word-count" id="outputCount">—</span>
    </div>
    <div class="output-body" id="outputBody">
      <span class="output-placeholder">处理后的文本将显示在这里…</span>
    </div>
    <div class="output-footer" id="outputFooter" style="display:none;">
      <button class="btn-copy" onclick="copyResult()">复制结果</button>
      <button class="btn-use" onclick="useAsInput()">用作原文</button>
      <span class="output-meta" id="outputMeta"></span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_KEY = 'sk-8060ffb799eb4724ba0d7fa1c7226f7c';
const API_URL = 'https://api.deepseek.com/v3.2_speciale_expires_on_20251215/chat/completions';

let currentMode = 'polish';
let currentStyle = '通用';
let isLoading = false;
let resultText = '';

const modeConfig = {
  polish: {
    label: '润色改写',
    prompt: (style, text) => `你是一位专业的中文写作编辑。请对以下文字进行润色改写，使其表达更流畅、准确、有感染力。风格要求：${style}风格。只返回改写后的文字，不要加任何解释或前缀。\n\n原文：\n${text}`,
    showStyle: true
  },
  expand: {
    label: '扩写',
    prompt: (style, text) => `你是一位专业的中文写作编辑。请对以下文字进行扩写，适当增加细节、描述和论述，使内容更丰富充实。风格要求：${style}风格。只返回扩写后的文字，不要加任何解释或前缀。\n\n原文：\n${text}`,
    showStyle: true
  },
  shorten: {
    label: '缩写',
    prompt: (_, text) => `你是一位专业的中文写作编辑。请对以下文字进行精简缩写，保留核心信息，去除冗余内容，使表达更简洁有力。只返回缩写后的文字，不要加任何解释或前缀。\n\n原文：\n${text}`,
    showStyle: false
  },
  formal: {
    label: '正式化',
    prompt: (_, text) => `你是一位专业的中文写作编辑。请将以下文字改写为正式、严谨的书面语风格，适合公文、报告、商务邮件等正式场合。只返回改写后的文字，不要加任何解释或前缀。\n\n原文：\n${text}`,
    showStyle: false
  },
  casual: {
    label: '口语化',
    prompt: (_, text) => `你是一位专业的中文写作编辑。请将以下文字改写为轻松自然的口语风格，适合朋友间交流、社交媒体等非正式场合，语气亲切易读。只返回改写后的文字，不要加任何解释或前缀。\n\n原文：\n${text}`,
    showStyle: false
  },
  proofread: {
    label: '校对纠错',
    prompt: (_, text) => `你是一位专业的中文校对编辑。请仔细检查以下文字中的错别字、语病、标点错误、逻辑问题，并给出修正后的版本。如有修改，请在文字后以【修改说明】列出具体改动点和原因。如无需修改，请回复"文字无误，无需修改"。\n\n原文：\n${text}`,
    showStyle: false
  }
};

document.getElementById('inputText').addEventListener('input', function() {
  document.getElementById('inputCount').textContent = this.value.length.toLocaleString() + ' 字';
});

function setMode(mode, el) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const showStyle = modeConfig[mode].showStyle;
  document.getElementById('styleRow').style.display = showStyle ? 'flex' : 'none';
}

function setStyle(el) {
  document.querySelectorAll('.style-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentStyle = el.dataset.val;
}

function clearAll() {
  document.getElementById('inputText').value = '';
  document.getElementById('inputCount').textContent = '0 字';
  document.getElementById('outputBody').innerHTML = '<span class="output-placeholder">处理后的文本将显示在这里…</span>';
  document.getElementById('outputCount').textContent = '—';
  document.getElementById('outputFooter').style.display = 'none';
  resultText = '';
}

async function runPolish() {
  if (isLoading) return;
  const text = document.getElementById('inputText').value.trim();
  if (!text) { showToast('请先输入文字'); return; }

  isLoading = true;
  document.getElementById('runBtn').disabled = true;
  resultText = '';

  const cfg = modeConfig[currentMode];
  const prompt = cfg.prompt(currentStyle, text);

  const outputBody = document.getElementById('outputBody');
  outputBody.className = 'output-body loading';
  outputBody.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  document.getElementById('outputFooter').style.display = 'none';
  document.getElementById('outputCount').textContent = '处理中…';

  const startTime = Date.now();

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + API_KEY
      },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [{ role: 'user', content: prompt }],
        max_tokens: 4000,
        temperature: 0.7,
        stream: true
      })
    });

    outputBody.className = 'output-body';
    outputBody.innerHTML = '';

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;
        try {
          const json = JSON.parse(data);
          const delta = json.choices?.[0]?.delta?.content || '';
          if (delta) {
            resultText += delta;
            outputBody.textContent = resultText;
            outputBody.scrollTop = outputBody.scrollHeight;
          }
        } catch {}
      }
    }

    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
    document.getElementById('outputCount').textContent = resultText.length.toLocaleString() + ' 字';
    document.getElementById('outputMeta').textContent = `耗时 ${elapsed}s`;
    document.getElementById('outputFooter').style.display = 'flex';

  } catch (err) {
    outputBody.className = 'output-body';
    outputBody.innerHTML = `<div class="error-box">请求失败：${err.message}<br>请检查网络连接或 API Key 是否有效。</div>`;
    document.getElementById('outputCount').textContent = '—';
  }

  isLoading = false;
  document.getElementById('runBtn').disabled = false;
}

function copyResult() {
  if (!resultText) return;
  navigator.clipboard.writeText(resultText).then(() => showToast('已复制到剪贴板'));
}

function useAsInput() {
  if (!resultText) return;
  document.getElementById('inputText').value = resultText;
  document.getElementById('inputCount').textContent = resultText.length.toLocaleString() + ' 字';
  document.getElementById('outputBody').innerHTML = '<span class="output-placeholder">处理后的文本将显示在这里…</span>';
  document.getElementById('outputCount').textContent = '—';
  document.getElementById('outputFooter').style.display = 'none';
  resultText = '';
  showToast('已填入原文区');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
